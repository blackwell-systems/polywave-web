name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout scout-and-wave-go
        uses: actions/checkout@v4
        with:
          repository: blackwell-systems/scout-and-wave-go
          path: .engine

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Update replace directive for CI
        run: go mod edit -replace github.com/blackwell-systems/scout-and-wave-go=./.engine

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage report
        run: go tool cover -func=coverage.out


                disabled={running}
              >
                Existing project
              </button>
              <button
                type="button"
                onClick={() => setMode('new')}
                className={`flex-1 py-1.5 transition-colors border-l border-border ${mode === 'new' ? 'bg-primary/10 text-primary' : 'bg-background text-muted-foreground hover:bg-muted'}`}
                disabled={running}
              >
                New project
              </button>
            </div>
            ```

            **3. Change textarea placeholder based on mode:**

            ```tsx

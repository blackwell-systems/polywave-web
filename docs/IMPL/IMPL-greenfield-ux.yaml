interface_contracts:
    - name: POST /api/bootstrap/run
      description: New Go endpoint that launches a bootstrap scout in architect mode
      definition: |
        // Request body (JSON)
        type BootstrapRunRequest struct {
            Description string `json:"description"`
            Repo        string `json:"repo,omitempty"`
        }
        // Response body (JSON, 202 Accepted)
        type BootstrapRunResponse struct {
            RunID string `json:"run_id"`
        }
        // SSE events re-use the same scout event names:
        // scout_output, scout_complete, scout_failed, scout_cancelled
        // The endpoint subscribes via GET /api/scout/{runID}/events (shared broker).
      location: pkg/api/bootstrap_handler.go
    - name: runBootstrap (TypeScript)
      description: Client function for the bootstrap endpoint, used by ScoutLauncher
      definition: |
        export interface BootstrapRunRequest {
          description: string
          repo?: string
        }
        export interface BootstrapRunResponse {
          run_id: string
        }
        export async function runBootstrap(
          description: string,
          repo?: string
        ): Promise<BootstrapRunResponse>
        // Re-uses subscribeScoutEvents(runId) from ../api for SSE
      location: web/src/lib/bootstrapApi.ts
    - name: AgentStatus.taskSummary (TypeScript)
      description: New optional field on AgentStatus carrying the first line of the task field
      definition: |
        // In web/src/types.ts, add to AgentStatus interface:
        taskSummary?: string   // first line/heading of the agent task field, populated by Go API
      location: web/src/types.ts
    - name: validateRepoPath (Go)
      description: Internal helper called by Settings save handler to validate a repo path
      definition: |
        // POST /api/config/validate-repo (new endpoint in config_handler.go)
        // Request body:
        type ValidateRepoRequest struct {
            Path string `json:"path"`
        }
        // Response body:
        type ValidateRepoResponse struct {
            Valid       bool   `json:"valid"`
            Error       string `json:"error,omitempty"`
            ErrorCode   string `json:"error_code,omitempty"` // "not_found" | "not_git" | "no_commits"
        }
      location: pkg/api/config_handler.go

            // - Passes bootstrap=true or equivalent flag to engine.RunScout if supported,
            //   otherwise injects "Bootstrap mode: design-first architect" into the feature string
            // Re-use publish/onChunk/finalize pattern from runScoutAgent exactly.
            func (s *Server) runBootstrapAgent(ctx context.Context, runID, description, repoOverride string) {
                // Mirror runScoutAgent structure:
                // 1. Resolve repoRoot
                // 2. slug = "bootstrap" (fixed, not slugified from description)
                // 3. implOut = filepath.Join(repoRoot, "docs", "IMPL", "IMPL-bootstrap.yaml")
                // 4. Read scoutModel from saw.config.json
                // 5. Call engine.RunScout with feature = "[BOOTSTRAP] " + description
                // 6. Finalize and publish scout_complete
            }

            // handleValidateRepoPath handles POST /api/config/validate-repo.
            func (s *Server) handleValidateRepoPath(w http.ResponseWriter, r *http.Request) { ... }
            ```

            **Register in server.go:**
            ```go
            s.mux.HandleFunc("POST /api/bootstrap/run", s.handleBootstrapRun)
            s.mux.HandleFunc("POST /api/config/validate-repo", s.handleValidateRepoPath)

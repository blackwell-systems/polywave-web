            mode: hide the additive constraint checkboxes, change placeholder text, and call the
            bootstrap API endpoint instead of the standard scout endpoint.

            ---

            ### New API function

            The scaffold file `web/src/lib/bootstrapApi.ts` defines the types and function
            signature. Implement it:

            ```typescript
            // web/src/lib/bootstrapApi.ts
            import { subscribeScoutEvents } from '../api'  // re-export for caller convenience

            export interface BootstrapRunRequest {
              description: string
              repo?: string
            }

            export interface BootstrapRunResponse {
              run_id: string
            }

            export async function runBootstrap(
              description: string,
              repo?: string
            ): Promise<BootstrapRunResponse> {
              const res = await fetch('/api/bootstrap/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description, repo } satisfies BootstrapRunRequest),
              })
              if (!res.ok) {
                const text = await res.text()
                throw new Error(`Bootstrap failed: ${text}`)
              }
              return res.json() as Promise<BootstrapRunResponse>
            }
            ```

            ---

            ### ScoutLauncher.tsx changes

            **1. Add mode toggle state:**

            ```typescript

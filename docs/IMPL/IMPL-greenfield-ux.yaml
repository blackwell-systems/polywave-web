            ---

            ### Part 1: Settings repo path validation (section 6.2)

            In `web/src/components/SettingsScreen.tsx`, add inline validation when a repo path
            is entered or when Save is clicked.

            **New API endpoint to call:** `POST /api/config/validate-repo`
            Implement this handler in `bootstrap_handler.go` (which you own). Register it in `server.go`.
            **Do not create or modify `config_handler.go`** — the interface contract doc lists it there
            for informational grouping, but Agent B owns `bootstrap_handler.go`, not `config_handler.go`.

            **Validation logic (Go, in bootstrap_handler.go):**
            ```go
            // POST /api/config/validate-repo
            // Request: {"path": "/absolute/path"}
            // Response: {"valid": true} or {"valid": false, "error": "...", "error_code": "not_found|not_git|no_commits"}
            func (s *Server) handleValidateRepoPath(w http.ResponseWriter, r *http.Request) {
                // 1. Check os.Stat(path) — error_code: "not_found"
                // 2. Check os.Stat(filepath.Join(path, ".git")) — error_code: "not_git"
                // 3. Run: git -C path log --oneline -1 — error_code: "no_commits" if empty output
            }
            ```

            **React changes in SettingsScreen.tsx:**
            - Add per-repo validation state: `repoValidation: Record<number, {valid: boolean, error: string, errorCode: string} | null>`
            - When user blurs the path input for a repo, call `POST /api/config/validate-repo`
            - Show inline error below the path field:
              - `not_found`: "Path does not exist"
              - `not_git`: "Not a git repository (run `git init` first)"
              - `no_commits`: "Repository has no commits (run `git commit --allow-empty -m 'init'` first)"
            - Show a green checkmark icon when valid
            - Block Save if any repo has a non-null invalid validation result
            - Do not validate empty paths (user may not have typed yet)

            ---


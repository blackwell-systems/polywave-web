title: Greenfield UX Quick Wins
feature_slug: greenfield-ux
verdict: SUITABLE
suitability_assessment: |
    8 independent UX fixes across disjoint files — 7 pure React component changes and 1 new
    Go API endpoint. File ownership is cleanly disjoint across all agents. The bootstrap
    endpoint (6.3) introduces the only cross-boundary dependency: the Go handler must exist
    before the React ScoutLauncher can call it. All other items are self-contained UI changes
    with no cross-agent type dependencies.

    Wave structure: Wave 1 runs 5 fully independent agents in parallel (items 6.1, 6.4, 6.5,
    6.7, 6.8). Wave 2 runs 2 agents (items 6.2 and 6.3) that depend on a shared API contract
    defined in the scaffold. Items 6.2 and 6.6 are actually independent of each other but
    6.3 needs the bootstrap endpoint defined first; grouping them in Wave 2 keeps the bootstrap
    API contract available for both agents without creating a 3-wave structure.

    Revised plan after analysis: items 6.2 (Settings validation) and 6.6 (Run next wave) are
    independent of the bootstrap endpoint. All 3 can run in parallel in Wave 1 if the bootstrap
    API contract is defined in a scaffold. This collapses to a single wave.

    FINAL STRUCTURE: 1 wave, 7 parallel agents. The bootstrap API contract (request/response
    types + endpoint signature) is defined in a scaffold so Agent G (ScoutLauncher) and
    Agent B (server.go registration) can both reference it independently.

    Suitability: SUITABLE. 7 agents across fully disjoint files. Build + test cycle is
    moderate (npm build + go build). All interface contracts are definable upfront.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~7 agents x 8 min avg = 56 min, parallelized to ~10-12 min
    - Merge and verification: ~5 min
    Total SAW time: ~25-27 min
    Sequential baseline: ~56 min
    Time savings: ~30 min (54% faster)
    Recommendation: Clear speedup. Proceed.

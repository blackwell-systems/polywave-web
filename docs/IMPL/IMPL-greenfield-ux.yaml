            // GET /api/scout/{runID}/events.
            func (s *Server) handleBootstrapRun(w http.ResponseWriter, r *http.Request) {
                var req BootstrapRunRequest
                // decode JSON: description + optional repo
                // generate runID (same pattern as handleScoutRun)
                // launch goroutine calling s.runBootstrapAgent(ctx, runID, req.Description, req.Repo)
                // return 202 {"run_id": runID}
            }

            // runBootstrapAgent is similar to runScoutAgent but:
            // - Uses the bootstrap prompt (saw-bootstrap.md) instead of the standard scout prompt

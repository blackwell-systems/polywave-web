# Integration notes:
# - pkg/api/server.go: register notification preference routes, attach NotificationBus
# - pkg/api/types.go: add NotificationPreferences to SAWConfig struct
# - pkg/api/wave_runner.go: call NotificationBus.Notify() at key event points
# - web/src/App.tsx: mount useNotifications hook, render ToastContainer
# - web/src/types.ts: add Toast and NotificationPreferences TypeScript interfaces
# - web/src/api.ts: add getNotificationPrefs() and saveNotificationPrefs()
# - web/src/components/SettingsScreen.tsx: add NotificationSettings section

waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## What to Implement
          Create the NotificationBus - a central hub that handlers call to emit
          user-facing notifications. The bus broadcasts events to all SSE clients
          via the existing globalBroker.

          ## Interfaces to Implement
          - `NewNotificationBus(broker *globalBroker) *NotificationBus`
          - `func (nb *NotificationBus) Notify(event NotificationEvent)`

          The Notify method should:
          1. Marshal the NotificationEvent to JSON
          2. Broadcast it via globalBroker as a "notification" SSE event with the
             JSON data payload (not just the event name like impl_list_updated)

          Modify the globalBroker.broadcast method or add a new broadcastWithData
          method that sends both `event:` and `data:` fields in the SSE stream.
          Currently broadcast() only sends `event: <name>\ndata: {}\n\n`. The
          notification events need `event: notification\ndata: <json>\n\n`.

          Add a `broadcastJSON(eventType string, data interface{})` method to
          globalBroker that marshals data to JSON and writes it as the SSE data field.

          ## Interfaces to Call
          - `NotificationEvent` and `NotificationEventType` from notification_types.go (scaffold)
          - `globalBroker` from global_events.go

          ## Tests to Write
          1. TestNotificationBus_Notify - verify that calling Notify broadcasts to subscribed clients
          2. TestNotificationBus_NotifyJSON - verify the SSE data payload is valid JSON
          3. TestGlobalBroker_BroadcastJSON - verify broadcastJSON sends event+data fields

          ## Verification Gate
          ```bash
          go build ./pkg/api/...
          go vet ./pkg/api/...
          go test ./pkg/api/ -run TestNotification -v
          ```

          ## Constraints
          - Do NOT modify wave_runner.go or server.go - integration wiring happens post-merge
          - The NotificationBus must be safe for concurrent use (Notify called from goroutines)
          - Keep the bus simple - no filtering/preferences logic on the backend; the frontend
            decides what to show based on user preferences
        files:
          - "pkg/api/notification_bus.go"
          - "pkg/api/notification_bus_test.go"
        dependencies: []

      - id: B
        task: |
          ## What to Implement
          Create HTTP handlers for notification preferences CRUD:
          - GET /api/notifications/preferences - read preferences from saw.config.json
          - POST /api/notifications/preferences - save preferences to saw.config.json

          Preferences are stored in saw.config.json under a "notifications" key.
          The handler reads/writes the full SAWConfig and updates only the notifications
          field, preserving all other config.

          ## Interfaces to Implement
          - `func (s *Server) handleGetNotificationPrefs(w http.ResponseWriter, r *http.Request)`
          - `func (s *Server) handleSaveNotificationPrefs(w http.ResponseWriter, r *http.Request)`

          Default preferences (when none configured):
          ```go
          NotificationPreferences{
            Enabled:       true,
            MutedTypes:    nil,
            BrowserNotify: true,
            ToastNotify:   true,
          }
          ```

          ## Interfaces to Call
          - `NotificationPreferences` from notification_types.go (scaffold)
          - `SAWConfig` from types.go (add a Notifications field)
          - File I/O pattern from config_handler.go (atomic write via temp file + rename)

          ## Tests to Write
          1. TestHandleGetNotificationPrefs_Default - returns defaults when no config exists
          2. TestHandleGetNotificationPrefs_Configured - returns saved preferences
          3. TestHandleSaveNotificationPrefs_Valid - saves and persists preferences
          4. TestHandleSaveNotificationPrefs_Invalid - rejects malformed JSON

          ## Verification Gate
          ```bash
          go build ./pkg/api/...
          go vet ./pkg/api/...
          go test ./pkg/api/ -run TestHandleNotification -v
          ```

          ## Constraints
          - Do NOT modify server.go to register routes - integration wiring happens post-merge
          - Follow the atomic write pattern from config_handler.go (temp file + os.Rename)
          - The handler must read the existing saw.config.json fully, update only the
            notifications field, and write back - do not clobber other config fields
          - Add `Notifications NotificationPreferences` field to a local config struct
            in this file (the integration agent will add it to SAWConfig in types.go)
        files:
          - "pkg/api/notification_prefs_handler.go"
          - "pkg/api/notification_prefs_handler_test.go"
        dependencies: []

      - id: C
        task: |
          ## What to Implement
          Create a ToastContainer React component that renders a stack of
          toast/snackbar notifications. Fixed position bottom-right of the viewport.

          Features:
          - Renders a list of Toast objects as dismissable cards
          - Color-coded by severity: success=green, error=red, warning=amber, info=blue
          - Auto-dismiss after 5 seconds (configurable via prop)
          - Manual dismiss via X button
          - Slide-in animation from right
          - Max 5 visible toasts; older ones auto-dismissed when limit exceeded
          - Dark mode support using existing Tailwind dark: classes

          ## Interfaces to Implement
          ```tsx
          interface ToastProps {
            toasts: Toast[];
            onDismiss: (id: string) => void;
            autoDismissMs?: number; // default 5000
          }

          export default function ToastContainer(props: ToastProps): JSX.Element
          ```

          Where Toast is:
          ```tsx
          interface Toast {
            id: string;
            type: string;
            title: string;
            message: string;
            severity: 'info' | 'success' | 'warning' | 'error';
            timestamp: number;
          }
          ```

          ## Interfaces to Call
          - Tailwind CSS classes (project uses Tailwind extensively)
          - lucide-react icons (X, CheckCircle, AlertTriangle, Info, XCircle)

          ## Tests to Write
          1. ToastContainer renders toasts with correct severity colors
          2. ToastContainer calls onDismiss when X clicked
          3. ToastContainer auto-dismisses after timeout
          4. ToastContainer limits visible toasts to 5

          ## Verification Gate
          ```bash
          cd web && npx tsc --noEmit && npx vitest run --reporter=verbose src/components/__tests__/ToastContainer.test.tsx
          ```

          ## Constraints
          - Use Tailwind classes consistent with existing components (see ReviewScreen.tsx,
            WaveBoard.tsx for patterns)
          - Use lucide-react for icons (already a project dependency)
          - Export the Toast interface from the component file
          - Do NOT modify App.tsx - integration wiring happens post-merge
          - Position: fixed bottom-4 right-4 z-50
        files:
          - "web/src/components/ToastContainer.tsx"
          - "web/src/components/__tests__/ToastContainer.test.tsx"
        dependencies: []

  - number: 2
    agents:
      - id: D
        task: |
          ## What to Implement
          Create the useNotifications React hook and NotificationSettings component.

          ### useNotifications hook
          Listens for "notification" events on the global SSE stream (/api/events).
          When a notification event arrives:
          1. Check if notifications are enabled (preferences.enabled)
          2. Check if this event type is muted (preferences.muted_types)
          3. If tab is focused AND toast_notify is true: add to toasts array
          4. If tab is NOT focused AND browser_notify is true: show Browser Notification
          5. If both are true: show both (browser notification brings attention, toast
             shows when they switch back)

          The hook manages:
          - Toast state (array of Toast objects with auto-generated IDs)
          - Preferences state (loaded from /api/notifications/preferences on mount)
          - Browser Notification permission state
          - document.visibilityState tracking for focus detection

          ### NotificationSettings component
          A settings panel (to be embedded in SettingsScreen by integration agent) with:
          - Master enable/disable toggle
          - Per-event-type checkboxes (wave_complete, agent_failed, merge_complete, etc.)
          - Browser notifications toggle (with permission request button if not granted)
          - Toast notifications toggle
          - "Test notification" button that dispatches a test toast

          ### API functions
          Add to api.ts (or create a local fetch wrapper):
          - getNotificationPrefs(): Promise<NotificationPreferences>
          - saveNotificationPrefs(prefs: NotificationPreferences): Promise<void>

          ## Interfaces to Implement
          ```tsx
          function useNotifications(): {
            toasts: Toast[];
            dismissToast: (id: string) => void;
            preferences: NotificationPreferences;
            updatePreferences: (prefs: NotificationPreferences) => Promise<void>;
          }

          function NotificationSettings({ preferences, onUpdate }: {
            preferences: NotificationPreferences;
            onUpdate: (prefs: NotificationPreferences) => Promise<void>;
          }): JSX.Element
          ```

          ## Interfaces to Call
          - Toast type from ToastContainer.tsx (Wave 1, Agent C)
          - ToastContainer component from ToastContainer.tsx (for re-export/reference)
          - /api/notifications/preferences endpoints (Wave 1, Agent B)
          - /api/events SSE stream (existing global_events.go)
          - Browser Notification API (window.Notification)

          ## Tests to Write
          1. useNotifications adds toast when notification event received and tab focused
          2. useNotifications shows browser notification when tab hidden
          3. useNotifications respects muted_types
          4. useNotifications dismissToast removes toast by id
          5. NotificationSettings toggles emit onUpdate calls

          ## Verification Gate
          ```bash
          cd web && npx tsc --noEmit && npx vitest run --reporter=verbose src/hooks/__tests__/useNotifications.test.ts
          ```

          ## Constraints
          - Import Toast type from '../components/ToastContainer' (Agent C, Wave 1)
          - The hook subscribes to the EXISTING /api/events EventSource, not a new one.
            It should accept an optional EventSource parameter or listen on a shared one.
            The simplest approach: create a new EventSource('/api/events') in the hook
            and close it on unmount. App.tsx already has one, but having two is fine
            since SSE connections are lightweight and the server handles multiple clients.
          - Do NOT modify App.tsx or SettingsScreen.tsx - integration agent wires those
          - Store notification preferences API calls in the hook file itself (not api.ts)
            to keep the agent's file ownership disjoint. Integration agent can move them
            to api.ts later if desired.
          - Use crypto.randomUUID() for toast IDs (available in all modern browsers)
        files:
          - "web/src/hooks/useNotifications.ts"
          - "web/src/hooks/__tests__/useNotifications.test.ts"
          - "web/src/components/NotificationSettings.tsx"
        dependencies:
          - "B"
          - "C"

pre_mortem:
  overall_risk: low
  rows:
    - scenario: "Multiple EventSource connections to /api/events cause browser connection limit issues"
      likelihood: low
      impact: low
      mitigation: "Server already uses h2c (HTTP/2 cleartext) which multiplexes connections. If issues arise, share a single EventSource via a store pattern similar to waveEventStore.ts."
    - scenario: "Browser Notification permission denied by user"
      likelihood: medium
      impact: low
      mitigation: "Hook gracefully degrades to toast-only mode. NotificationSettings shows permission status and re-request button."
    - scenario: "Toast z-index conflicts with existing modals (settings drawer, command palette)"
      likelihood: low
      impact: low
      mitigation: "ToastContainer uses z-50 which matches existing overlay conventions. Integration agent can adjust if needed."

known_issues: []


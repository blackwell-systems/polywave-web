# IMPL: notification-system
title: "Notification System - In-Browser Notifications with Extensible Backend"
feature_slug: notification-system
verdict: SUITABLE
test_command: "cd web && npx vitest run && cd .. && go test ./pkg/api/..."
lint_command: "go vet ./pkg/api/..."
state: SCOUT_PENDING

# Suitability Assessment
# ----------------------
# Verdict: SUITABLE
#
# 1. File decomposition: YES - Work splits cleanly across backend (Go notification bus,
#    SSE emission, config handler, preferences endpoint) and frontend (toast component,
#    browser notification hook, notification preferences UI, global event listener wiring).
#    At least 5 distinct new files plus modifications to 3-4 existing files. All agents
#    can have disjoint file ownership.
#
# 2. Investigation-first: NO - The existing SSE infrastructure (globalBroker, per-slug
#    broker) is well-understood. The Browser Notification API is standard. No unknowns.
#
# 3. Interface discoverability: YES - The NotificationEvent type, NotificationBus interface,
#    and SSE event shape can be fully defined before implementation. The existing publish()
#    pattern in wave_runner.go provides the template.
#
# 4. Pre-implementation status check:
#    Total items: 7 (notification bus, SSE emission, preferences config, preferences API,
#    toast component, browser notification hook, preferences UI)
#    Already implemented (DONE): 0
#    Partially implemented (PARTIAL): 1 (App.tsx line 123-125 already requests Notification
#    permission on mount, but does nothing with it)
#    Not implemented (TO-DO): 6
#
# 5. Parallelization value: HIGH - Backend Go agents and frontend TypeScript agents are
#    fully independent (different languages, different build systems). Wave 1 agents can
#    all run in parallel. Build+test cycles are ~30s for Go and ~15s for frontend.
#
# Estimated times:
# - Scout phase: ~8 min
# - Agent execution: ~12 min (4 agents x 8 min avg, 2 waves, wave 1 has 3 parallel agents)
# - Merge & verification: ~4 min
# Total SAW time: ~24 min
#
# Sequential baseline: ~40 min (4 agents x 10 min avg)
# Time savings: ~16 min (~40% faster)
# Recommendation: Clear speedup. Proceed.

suitability_assessment: |
  Verdict: SUITABLE

  The notification system decomposes cleanly into backend (Go) and frontend (TypeScript)
  work with no shared files between agents. The backend notification bus and SSE emission
  are independent of the frontend toast/browser notification components. Preferences
  storage extends the existing SAWConfig pattern.

  App.tsx already calls Notification.requestPermission() on mount (line 123) but does
  nothing further. The new useNotifications hook will replace this with proper event
  handling.

  Phase 2 extensibility (webhooks, Slack, desktop) is achieved through the NotificationBus
  abstraction - new channels subscribe to the same bus without modifying existing code.


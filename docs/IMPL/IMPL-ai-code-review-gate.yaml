interface_contracts:
  - name: ReviewDiff
    description: |-
      Core entry point for the codereview package. Calls the Anthropic Messages
      API with the merged diff and returns structured scoring across 5 dimensions.
      The ctx carries deadline/cancellation. diff is the raw git diff output.
      opts controls model selection, threshold, and which dimensions are enabled.
    definition: |
      // ReviewDiff submits the merged diff to the LLM and returns a ReviewResult.
      // Returns error if the API call fails or response cannot be parsed.
      func ReviewDiff(ctx context.Context, diff string, opts ReviewOpts) (*ReviewResult, error)
    location: pkg/codereview/reviewer.go

  - name: ReviewOpts
    description: |-
      Configuration passed to ReviewDiff. Model defaults to "claude-haiku-4-5" if
      empty (fast, cheap for review). Threshold is the minimum overall score
      (0-100) for a passing review. Dimensions lists which of the 5 standard
      dimensions to score; if empty, all 5 are used.
    definition: |
      type ReviewOpts struct {
          Model      string   // Anthropic model ID; defaults to "claude-haiku-4-5"
          Threshold  int      // Minimum overall score to pass (0-100); default 70
          Dimensions []string // Subset of standard dimensions; empty = all 5
      }

      // Standard dimension names (use as ReviewOpts.Dimensions values)
      const (
          DimCodeQuality    = "code_quality"
          DimNamingClarity  = "naming_clarity"
          DimComplexity     = "complexity"
          DimPatternAdherence = "pattern_adherence"
          DimSecurity       = "security"
      )
    location: pkg/codereview/types.go

  - name: ReviewResult
    description: |-
      Structured output from ReviewDiff. Dimensions contains one entry per
      scored dimension. Overall is the weighted average (0-100). Passed is
      true when Overall >= threshold. Summary is a 1-3 sentence plain-text
      summary for display in the UI and IMPL doc completion report.
    definition: |
      type ReviewResult struct {
          Dimensions []DimensionScore `json:"dimensions"`
          Overall    int              `json:"overall"`
          Passed     bool             `json:"passed"`
          Summary    string           `json:"summary"`
          Model      string           `json:"model"`
          DiffBytes  int              `json:"diff_bytes"`
      }

      type DimensionScore struct {
          Name     string `json:"name"`     // one of the Dim* constants
          Score    int    `json:"score"`    // 0-100
          Rationale string `json:"rationale"` // 1-2 sentence explanation
      }
    location: pkg/codereview/types.go

  - name: RunCodeReview
    description: |-
      Top-level function called from runFinalizeSteps (wave_runner.go) and
      optionally from the CLI run-review command. Gets the merged diff via
      git diff HEAD~1..HEAD in repoPath, reads ReviewOpts from saw.config.json
      CodeReview section, and calls ReviewDiff. Returns nil result when
      code review is disabled in config.
    definition: |
      // RunCodeReview runs the AI code review gate for the given repo after merge.
      // Returns (nil, nil) when code review is disabled (cfg.Enabled == false).
      func RunCodeReview(ctx context.Context, repoPath string, cfg CodeReviewConfig) (*ReviewResult, error)
    location: pkg/codereview/reviewer.go

  - name: CodeReviewConfig
    description: |-
      Mirrors the saw.config.json "code_review" section. Enabled gates whether
      any review runs. Blocking controls whether a failing review (overall score
      below threshold) stops progression to the next wave. Model and Threshold
      override defaults.
    definition: |
      type CodeReviewConfig struct {
          Enabled    bool     `json:"enabled"`
          Blocking   bool     `json:"blocking"`
          Model      string   `json:"model"`      // defaults to "claude-haiku-4-5"
          Threshold  int      `json:"threshold"`  // defaults to 70
          Dimensions []string `json:"dimensions"` // empty = all 5
      }
    location: pkg/codereview/types.go

  - name: StepCodeReview
    description: |-
      New pipeline step constant inserted into PipelineStep and PipelineStepOrder
      in pipeline_state.go. Positioned after StepVerifyBuild (step 7) and before
      StepIntegrationAgent (step 8). All downstream agents that check
      PipelineStepOrder must see the updated slice.
    definition: |
      StepCodeReview PipelineStep = "code_review"

      // PipelineStepOrder (updated — code_review inserted at index 7):
      var PipelineStepOrder = []PipelineStep{
          StepVerifyCommits, StepScanStubs, StepRunGates,
          StepValidateIntegration, StepMergeAgents, StepFixGoMod,
          StepVerifyBuild, StepCodeReview, StepIntegrationAgent, StepCleanup,
      }
    location: pkg/api/pipeline_state.go

  - name: CodeReviewResult (SSE event payload)
    description: |-
      SSE event "code_review_result" emitted by runFinalizeSteps after the
      review completes. The web UI listens for this event to render the
      ReviewResultPanel component. Matches ReviewResult fields for direct
      JSON passthrough.
    definition: |
      // Event name: "code_review_result"
      // Data shape (matches ReviewResult JSON):
      type CodeReviewSSEPayload struct {
          Dimensions []DimensionScore `json:"dimensions"`
          Overall    int              `json:"overall"`
          Passed     bool             `json:"passed"`
          Summary    string           `json:"summary"`
          Model      string           `json:"model"`
          DiffBytes  int              `json:"diff_bytes"`
          Wave       int              `json:"wave"`
          Slug       string           `json:"slug"`
      }
    location: pkg/api/wave_runner.go

  - name: CodeReviewConfig in SAWConfig (web types)
    description: |-
      Extension to the frontend SAWConfig type and the backend api.QualityConfig
      to carry code_review settings. The backend api.SAWConfig.Quality gains a
      CodeReview field; the frontend SAWConfig.quality gains code_review.
    definition: |
      // Backend (pkg/api/types.go):
      type QualityConfig struct {
          RequireTests   bool             `json:"require_tests"`
          RequireLint    bool             `json:"require_lint"`
          BlockOnFailure bool             `json:"block_on_failure"`
          CodeReview     CodeReviewCfg    `json:"code_review"`
      }
      type CodeReviewCfg struct {
          Enabled   bool   `json:"enabled"`
          Blocking  bool   `json:"blocking"`
          Model     string `json:"model"`
          Threshold int    `json:"threshold"`
      }

      // Frontend (web/src/types.ts):
      // SAWConfig.quality gains:
      code_review?: {
          enabled: boolean
          blocking: boolean
          model: string
          threshold: number
      }
    location: pkg/api/types.go


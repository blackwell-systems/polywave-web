waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## Agent A — codereview package (scout-and-wave-go)

          Implement the new `pkg/codereview` package in the scout-and-wave-go repo
          at `/Users/dayna.blackwell/code/scout-and-wave-go`.

          ### Files to create
          - `pkg/codereview/types.go` — all exported types
          - `pkg/codereview/reviewer.go` — ReviewDiff and RunCodeReview implementations
          - `pkg/codereview/reviewer_test.go` — unit tests

          ### Interface contracts (implement exactly)

          **pkg/codereview/types.go:**
          ```go
          package codereview

          import "context"

          const (
              DimCodeQuality     = "code_quality"
              DimNamingClarity   = "naming_clarity"
              DimComplexity      = "complexity"
              DimPatternAdherence = "pattern_adherence"
              DimSecurity        = "security"
          )

          // AllDimensions lists the 5 standard review dimensions in order.
          var AllDimensions = []string{
              DimCodeQuality, DimNamingClarity, DimComplexity,
              DimPatternAdherence, DimSecurity,
          }

          type DimensionScore struct {
              Name      string `json:"name"`
              Score     int    `json:"score"`    // 0-100
              Rationale string `json:"rationale"`
          }

          type ReviewResult struct {
              Dimensions []DimensionScore `json:"dimensions"`
              Overall    int              `json:"overall"`
              Passed     bool             `json:"passed"`
              Summary    string           `json:"summary"`
              Model      string           `json:"model"`
              DiffBytes  int              `json:"diff_bytes"`
          }

          type ReviewOpts struct {
              Model      string
              Threshold  int
              Dimensions []string
          }

          type CodeReviewConfig struct {
              Enabled    bool     `json:"enabled"`
              Blocking   bool     `json:"blocking"`
              Model      string   `json:"model"`
              Threshold  int      `json:"threshold"`
              Dimensions []string `json:"dimensions"`
          }
          ```

          **pkg/codereview/reviewer.go:**
          ```go
          package codereview

          import "context"

          func ReviewDiff(ctx context.Context, diff string, opts ReviewOpts) (*ReviewResult, error)
          func RunCodeReview(ctx context.Context, repoPath string, cfg CodeReviewConfig) (*ReviewResult, error)
          ```

          ### Implementation details

          **ReviewDiff:**
          - Import `anthropic "github.com/anthropics/anthropic-sdk-go"` and `"github.com/anthropics/anthropic-sdk-go/option"`
          - Default model: `"claude-haiku-4-5"` (fast, cheap for review)
          - Default threshold: 70 (0-100 scale)
          - Use dimensions from opts.Dimensions; if empty use AllDimensions
          - Build a system prompt that instructs the model to score each dimension
            0-100 with a 1-2 sentence rationale, and provide a 1-3 sentence
            summary. Request JSON output in this exact schema:
            ```json
            {
              "dimensions": [
                {"name": "code_quality", "score": 85, "rationale": "..."},
                ...
              ],
              "overall": 82,
              "summary": "..."
            }
            ```
          - Use `anthropic.NewClient(option.WithAPIKey(os.Getenv("ANTHROPIC_API_KEY")))`.
          - Use `client.Messages.New(ctx, params)` (non-streaming, single turn — no tool use).
          - Set MaxTokens to 1024 (sufficient for review JSON).
          - Parse the JSON response text into ReviewResult. Set `Passed = (Overall >= threshold)`.
          - If diff is empty string, return a ReviewResult with all zeros and
            Passed=true (nothing to review).
          - If diff exceeds 50000 bytes, truncate to first 50000 bytes and note
            truncation in the user message.

          **RunCodeReview:**
          - Return (nil, nil) when cfg.Enabled is false.
          - Get the diff via `exec.Command("git", "-C", repoPath, "diff", "HEAD~1..HEAD")`.
          - If git command fails (e.g. only one commit), fall back to
            `git diff HEAD` (shows unstaged/staged changes) — do not error.
          - Build ReviewOpts from cfg: Model, Threshold, Dimensions.
          - Call ReviewDiff and return its result.

          ### Tests (reviewer_test.go)
          - `TestAllDimensionsConstant` — verifies AllDimensions has exactly 5 entries
          - `TestReviewOptsDefaults` — verifies default model/threshold applied when zero
          - `TestReviewDiffEmptyDiff` — verifies empty diff returns Passed=true, Overall=0
          - `TestRunCodeReviewDisabled` — verifies disabled config returns (nil, nil)
          - Use httptest.NewServer to mock the Anthropic API for TestReviewDiff* tests
            that call the API. The mock server should return a valid JSON response.

          ### Dependencies
          The `anthropic-sdk-go` module is already in go.mod. No new dependencies needed.
          The package must be importable as:
          `github.com/blackwell-systems/scout-and-wave-go/pkg/codereview`

          ### Verification gate

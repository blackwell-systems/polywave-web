pre_mortem:
  overall_risk: medium
  rows:
    - scenario: |-
        Agent C references SAWConfig.Quality.CodeReview and SAWConfig.Agent.ReviewModel
        in wave_runner.go before Agent E adds those fields to types.go in Wave 2.
        This causes a compilation failure in the scout-and-wave-web repo during Wave 1.
      likelihood: high
      impact: high
      mitigation: |-
        Agent C's task instructs them to write the code but add a TODO comment
        if the fields don't yet exist. The integration wave (Agent E) adds the fields
        first, then the code compiles. Alternatively, Agent C can define a temporary
        local struct to bridge the gap and note it in their completion report. The
        quality gate runs after Wave 2, so compilation is verified post-integration.

    - scenario: |-
        The scout-and-wave-go codereview package is not yet available as a Go
        dependency in scout-and-wave-web's go.mod when Agent C runs. The import
        `github.com/blackwell-systems/scout-and-wave-go/pkg/codereview` will fail
        to resolve in the web worktree.
      likelihood: medium
      impact: high
      mitigation: |-
        Agent C should write the import and code, but note in their completion
        report that the dependency requires the scout-and-wave-go changes to be
        merged and released (or the go.mod replace directive updated). The web repo
        uses go.mod replace directives for local development. The integration wave
        should verify the import resolves before running go test.

    - scenario: |-
        The ANTHROPIC_API_KEY environment variable is not set in the server
        process, causing RunCodeReview to fail at runtime with an auth error.
      likelihood: medium
      impact: medium
      mitigation: |-
        RunCodeReview should check for the API key before making a call and return
        a descriptive error (not a panic). The error is non-fatal in the pipeline
        (logged but does not block progression). Document in the web UI that code
        review requires ANTHROPIC_API_KEY to be set in the server environment.

    - scenario: |-
        The merged diff for large waves (e.g. 50+ files) exceeds practical
        review quality — the LLM produces generic scores without reading the full diff.
      likelihood: low
      impact: low
      mitigation: |-
        The 50000-byte truncation limit in ReviewDiff handles this. Users can
        disable code review in saw.config.json for large waves. Future work:
        per-file review with aggregation.

    - scenario: |-
        The new StepCodeReview inserted into PipelineStepOrder at index 7 breaks
        the shouldSkip logic in runFinalizeSteps for in-progress pipeline resumes
        where an older state file was saved without the new step.
      likelihood: low
      impact: medium
      mitigation: |-
        The shouldSkip function iterates PipelineStepOrder to find the resume point.
        An older state file won't have StepCodeReview in its completed steps map,
        so shouldSkip will return false for it (treats it as not-yet-done). This
        is the correct behavior — the review will run even on resume. No fix needed.


title: Fix API drift between polywave-go SDK and polywave-web service layer
feature_slug: sdk-api-drift-fix
verdict: SUITABLE_WITH_CAVEATS
suitability_assessment: |
    The work targets 3 files in pkg/service/ with 10+ compile errors caused by SDK
    API signature changes. All changes are mechanical: adding context.Context params,
    switching from error returns to result.Result handling, and adding *slog.Logger args.

    Suitability gate:
    1. File decomposition: 3 files change (impl_service.go, merge_service.go,
       merge_service_test.go). Cannot decompose into 2+ agents with disjoint ownership
       since the changes are tightly coupled. Single-agent execution is appropriate.
    2. Investigation-first: No. Root cause is known (SDK evolved, web not updated).
    3. Interface discoverability: Yes. SDK signatures are fixed and verified.
    4. Pre-implementation status: All errors are TODO (none partially fixed).
    5. Parallelization value: Low. Mechanical edits in 3 files, ~10 min sequential.
       Single agent avoids SAW overhead. Value is coordination/tracking, not speed.

    Test cascade: merge_service_test.go line 86 assigns MergeFunc with old signature
    (func(...) error). Changing MergeFunc's type to return result.Result will break
    the test. File added to agent ownership.

    Estimated times:
    - Scout phase: ~5 min
    - Agent execution: ~5 min (1 agent, mechanical changes)
    - Merge & verification: ~1 min
    Total SAW time: ~11 min
    Sequential baseline: ~10 min
    Time savings: ~-1 min (overhead slightly exceeds savings)
    Recommendation: Marginal gains. Value is in tracking, not parallelization.

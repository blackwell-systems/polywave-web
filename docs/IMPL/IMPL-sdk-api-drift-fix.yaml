      definition: |
        func ResolveConflicts(ctx context.Context, opts ResolveConflictsOpts) result.Result[ResolveData]
      location: pkg/engine/resolve_conflicts.go (in polywave-go)
    - name: engine.FixBuildFailure
      description: AI-assisted build fix (return type changed from error to result.Result[FixBuildData])
      definition: |
        func FixBuildFailure(ctx context.Context, opts FixBuildOpts) result.Result[FixBuildData]
      location: pkg/engine/fix_build.go (in polywave-go)
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Fix compile errors in pkg/service/ caused by SDK API drift. All changes
            are mechanical signature updates. The ctx variable is already available at
            every call site. For the logger parameter, use slog.Default().

            ### File 1: pkg/service/impl_service.go

            **Change 1:** Add context.Background() to protocol.Load calls.
            Add `"context"` to the import block.

            Find this exact code:
            ```go
            if m, err := protocol.Load(fullPath); err == nil {
            ```
            Replace with:
            ```go
            if m, err := protocol.Load(context.Background(), fullPath); err == nil {
            ```

            Find this exact code:
            ```go
            manifest, loadErr := protocol.Load(implPath)
            ```
            Replace with:
            ```go
            manifest, loadErr := protocol.Load(context.Background(), implPath)
            ```

            ### File 2: pkg/service/merge_service.go

            Add these imports:
            - `"log/slog"`
            - `"github.com/blackwell-systems/polywave-go/pkg/result"`

            **Change 2:** Update MergeFunc var declaration.

            Find this exact code:
            ```go
            var MergeFunc = func(ctx context.Context, opts engine.RunMergeOpts) error {
            	return engine.MergeWave(ctx, opts)
            }
            ```
            Replace with:
            ```go
            var MergeFunc = func(ctx context.Context, opts engine.RunMergeOpts) result.Result[engine.MergeData] {
            	return engine.MergeWave(ctx, opts)
            }
            ```

            **Change 3:** Update ResolveConflictsFunc var declaration.

            Find this exact code:
            ```go
            var ResolveConflictsFunc = func(ctx context.Context, opts engine.ResolveConflictsOpts) error {
            	return engine.ResolveConflicts(ctx, opts)
            }
            ```
            Replace with:
            ```go
            var ResolveConflictsFunc = func(ctx context.Context, opts engine.ResolveConflictsOpts) result.Result[engine.ResolveData] {
            	return engine.ResolveConflicts(ctx, opts)
            }
            ```

            **Change 4:** Update MergeFunc caller in MergeWave function.

            Find this exact code:
            ```go
            		err := MergeFunc(ctx, engine.RunMergeOpts{
            			IMPLPath: implPath,
            			RepoPath: repoPath,
            			WaveNum:  wave,
            		})
            		if err != nil {
            			conflictingFiles := extractConflictingFiles(err.Error())
            			publish("merge_failed", map[string]interface{}{
            				"slug":              slug,
            				"wave":              wave,
            				"error":             err.Error(),
            				"conflicting_files": conflictingFiles,
            			})
            			return
            		}
            ```
            Replace with:
            ```go
            		mergeResult := MergeFunc(ctx, engine.RunMergeOpts{
            			IMPLPath: implPath,
            			RepoPath: repoPath,
            			WaveNum:  wave,
            		})
            		if mergeResult.IsFatal() {
            			errMsg := mergeResult.Errors[0].Error()
            			conflictingFiles := extractConflictingFiles(errMsg)
            			publish("merge_failed", map[string]interface{}{
            				"slug":              slug,
            				"wave":              wave,
            				"error":             errMsg,
            				"conflicting_files": conflictingFiles,
            			})
            			return
            		}
            ```

            **Change 5:** Update first protocol.Cleanup call (in MergeWave goroutine).

            Find this exact code:
            ```go
            		if cleanupResult, cleanErr := protocol.Cleanup(implPath, wave, repoPath); cleanErr != nil {
            			publish("merge_output", map[string]interface{}{"slug": slug, "wave": wave, "chunk": fmt.Sprintf("Cleanup warning: %v\n", cleanErr)})
            		} else if cleanupResult.IsSuccess() {
            			publish("merge_output", map[string]interface{}{"slug": slug, "wave": wave, "chunk": fmt.Sprintf("Cleaned up %d worktrees\n", len(cleanupResult.GetData().Agents))})
            		}
            ```
            Replace with:
            ```go
            		cleanupResult := protocol.Cleanup(ctx, implPath, wave, repoPath, slog.Default())
            		if cleanupResult.IsFatal() {
            			publish("merge_output", map[string]interface{}{"slug": slug, "wave": wave, "chunk": fmt.Sprintf("Cleanup warning: %v\n", cleanupResult.Errors[0])})
            		} else if cleanupResult.IsSuccess() {
            			publish("merge_output", map[string]interface{}{"slug": slug, "wave": wave, "chunk": fmt.Sprintf("Cleaned up %d worktrees\n", len(cleanupResult.GetData().Agents))})
            		}
            ```

            **Change 6:** Update protocol.Load call in RunTests goroutine.

            Find this exact code:
            ```go
            		manifest, err := protocol.Load(implPath)
            ```
            Replace with:
            ```go
            		manifest, err := protocol.Load(ctx, implPath)
            ```

            **Change 7:** Update engine.FixBuildFailure call and error handling in FixBuild goroutine.

            Find this exact code:
            ```go
            		err := engine.FixBuildFailure(context.Background(), engine.FixBuildOpts{
            ```
            Replace the variable name:
            ```go
            		fixResult := engine.FixBuildFailure(context.Background(), engine.FixBuildOpts{
            ```

            Then find the error check block after the FixBuildOpts closing brace:
            ```go
            		if err != nil {
            			publish("fix_build_failed", map[string]interface{}{
            				"slug":  slug,
            				"wave":  wave,
            				"error": err.Error(),
            			})
            			return
            		}
            ```
            Replace with:
            ```go
            		if fixResult.IsFatal() {
            			publish("fix_build_failed", map[string]interface{}{
            				"slug":  slug,
            				"wave":  wave,
            				"error": fixResult.Errors[0].Error(),
            			})
            			return
            		}
            ```

            **Change 8:** Update ResolveConflictsFunc caller in ResolveConflicts function.

            Find this exact code:
            ```go
            		err := ResolveConflictsFunc(ctx, engine.ResolveConflictsOpts{
            ```
            Replace variable name:
            ```go
            		resolveResult := ResolveConflictsFunc(ctx, engine.ResolveConflictsOpts{
            ```

            Then find the error check after the opts closing brace and paren:
            ```go
            		if err != nil {
            			publish("conflict_resolution_failed", map[string]interface{}{
            				"slug":  slug,
            				"wave":  wave,
            				"error": err.Error(),
            			})
            			return
            		}
            ```
            Replace with:
            ```go
            		if resolveResult.IsFatal() {
            			publish("conflict_resolution_failed", map[string]interface{}{
            				"slug":  slug,
            				"wave":  wave,
            				"error": resolveResult.Errors[0].Error(),
            			})
            			return
            		}
            ```

            **Change 9:** Update second protocol.Cleanup call (in ResolveConflicts goroutine).
            Same pattern as Change 5.

            Find this exact code:
            ```go
            		if cleanupResult, cleanErr := protocol.Cleanup(implPath, wave, repoPath); cleanErr != nil {
            			publish("merge_output", map[string]interface{}{"slug": slug, "wave": wave, "chunk": fmt.Sprintf("Cleanup warning: %v\n", cleanErr)})
            		} else if cleanupResult.IsSuccess() {
            			publish("merge_output", map[string]interface{}{"slug": slug, "wave": wave, "chunk": fmt.Sprintf("Cleaned up %d worktrees\n", len(cleanupResult.GetData().Agents))})
            		}
            ```
            Replace with:
            ```go
            		cleanupResult := protocol.Cleanup(ctx, implPath, wave, repoPath, slog.Default())
            		if cleanupResult.IsFatal() {
            			publish("merge_output", map[string]interface{}{"slug": slug, "wave": wave, "chunk": fmt.Sprintf("Cleanup warning: %v\n", cleanupResult.Errors[0])})
            		} else if cleanupResult.IsSuccess() {
            			publish("merge_output", map[string]interface{}{"slug": slug, "wave": wave, "chunk": fmt.Sprintf("Cleaned up %d worktrees\n", len(cleanupResult.GetData().Agents))})
            		}
            ```

            ### File 3: pkg/service/merge_service_test.go

            **Change 10:** Update MergeFunc mock in TestMergeWave_ConcurrentGuard.
            The mock assigns MergeFunc with old return type (error). Update to return
            result.Result[engine.MergeData].

            Add `"github.com/blackwell-systems/polywave-go/pkg/result"` to imports.

            Find this exact code:
            ```go
            	MergeFunc = func(_ context.Context, _ engine.RunMergeOpts) error {
            		// Signal that we've started, then block
            		close(started)
            		<-block
            		return nil
            	}
            ```
            Replace with:
            ```go
            	MergeFunc = func(_ context.Context, _ engine.RunMergeOpts) result.Result[engine.MergeData] {
            		// Signal that we've started, then block
            		close(started)
            		<-block
            		return result.NewSuccess(engine.MergeData{})
            	}
            ```

            ## Interfaces

            All interfaces are defined by the upstream SDK (polywave-go). No new
            interfaces are introduced. See interface_contracts in the IMPL doc header.

            ## Tests

            Run existing tests after changes to verify nothing regresses:
            ```
            cd /Users/dayna.blackwell/workspace/code/polywave-web && GOWORK=off go test ./pkg/service/...
            ```

            ## Verification gate
            ```
            cd /Users/dayna.blackwell/workspace/code/polywave-web && GOWORK=off go build ./... && go vet ./pkg/service/...
            ```

            Postcondition checks:
            ```bash
            # Verify no remaining old-style protocol.Load calls (should be 0)
            grep -c 'protocol\.Load([^c]' /Users/dayna.blackwell/workspace/code/polywave-web/pkg/service/impl_service.go /Users/dayna.blackwell/workspace/code/polywave-web/pkg/service/merge_service.go
            # Expected: 0 for both files

            # Verify result import exists in merge_service.go
            grep -c 'pkg/result' /Users/dayna.blackwell/workspace/code/polywave-web/pkg/service/merge_service.go
            # Expected: 1

            # Verify slog import exists in merge_service.go
            grep -c '"log/slog"' /Users/dayna.blackwell/workspace/code/polywave-web/pkg/service/merge_service.go
            # Expected: 1
            ```

            ## Constraints
            - Do NOT modify files outside the 3 owned files
            - Do NOT change function signatures of the service-layer functions themselves (MergeWave, RunTests, FixBuild, ResolveConflicts, etc.) -- only update their internal calls to SDK functions
            - Do NOT update go.mod or go.sum -- the SDK dependency is already at the correct version via replace directive
            - Do NOT add or remove any exported types or functions
          files:
            - pkg/service/impl_service.go
            - pkg/service/merge_service.go
            - pkg/service/merge_service_test.go
          context_source: prepared-brief

        func Load(ctx context.Context, path string) (*IMPLManifest, error)
      location: pkg/protocol/manifest.go (in polywave-go)
    - name: protocol.Cleanup
      description: Clean up worktrees after wave merge (now requires context.Context, *slog.Logger; returns result.Result)
      definition: |
        func Cleanup(ctx context.Context, manifestPath string, waveNum int, repoDir string, logger *slog.Logger) result.Result[CleanupData]
      location: pkg/protocol/cleanup.go (in polywave-go)
    - name: engine.MergeWave

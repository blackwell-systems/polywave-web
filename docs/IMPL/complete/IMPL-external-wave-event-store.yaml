pre_mortem:
    overall_risk: low
    rows:
        - scenario: useSyncExternalStore causes tearing or infinite re-renders due to unstable snapshot references
          likelihood: medium
          impact: high
          mitigation: Agent A's getSnapshot must return the same object reference when state has not changed. Test 13 (TestSnapshotReferentialStability) explicitly verifies this. Agent B's useCallback with [slug] dep prevents resubscription loops.
        - scenario: SSE events arrive between unsubscribe and re-subscribe during slug change, causing missed events
          likelihood: low
          impact: medium
          mitigation: This is the existing behavior (current hook closes EventSource on slug change too). The store improves this slightly because state persists, but SSE gap during reconnection is unchanged. Not a regression.
        - scenario: Memory leak from never-deleted Map entries for slugs no longer in use
          likelihood: low
          impact: low
          mitigation: Acceptable tradeoff for this feature. Entries are lightweight (state object + null EventSource). A future cleanup pass could add TTL eviction. The resetStore function handles test cleanup.

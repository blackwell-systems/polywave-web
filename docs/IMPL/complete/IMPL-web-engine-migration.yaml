suitability_assessment: |
    SUITABLE. The work decomposes cleanly across 4 files in 2 packages with no
    conflicting ownership. All files are in the web repo only.

    1. File decomposition: 4 target files across pkg/api/ and pkg/service/, plus
       2 test files. Each file has a distinct responsibility (wave runner finalization,
       wave service inline finalization, merge service post-merge cleanup, merge/test
       handlers). No two agents need conflicting modifications to the same file.

    2. Investigation-first items: None. The engine step functions are already
       implemented and tested in scout-and-wave-go. The duplicate code in the web
       app is clearly identified in the parallel-systems-audit Finding #1.

    3. Interface discoverability: Yes. The engine functions have stable, documented
       signatures (FinalizeWave, FinalizeWaveOpts, FinalizeWaveResult, MergeWave,
       RunMergeOpts). No new interfaces needed -- we are consuming existing ones.

    4. Pre-implementation status: The engine decomposition (IMPL-engine-decomposition)
       is complete. The engine functions exist and are tested. The web app still uses
       the old inline implementations.

    5. Parallelization value: Build+test cycle is ~45s (go test ./... + vitest).
       2 agents with 2-3 files each. Clear speedup over sequential. The two packages
       (api/ and service/) are independent -- agent changes do not overlap.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~8 min (2 agents x 8 min avg, Wave 1 parallel)
    - Merge & verification: ~3 min
    Total SAW time: ~19 min

    Sequential baseline: ~22 min (2 agents x 11 min avg sequential)
    Time savings: ~3 min (14% faster)

    Recommendation: Clear speedup, plus coordination value for tracking the
    cross-package migration. The files are in separate packages with zero import
    dependencies on each other, making this a clean single-wave parallel execution.

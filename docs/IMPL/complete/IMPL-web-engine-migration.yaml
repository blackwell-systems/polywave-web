pre_mortem:
    overall_risk: medium
    rows:
        - scenario: SSE event payload shape changes break frontend
          likelihood: medium
          impact: high
          mitigation: |
            Agents must preserve exact event names and payload shapes.
            Run frontend tests (vitest) as part of verification.
        - scenario: Pipeline tracker state machine breaks on resume
          likelihood: medium
          impact: medium
          mitigation: |
            Agent A must preserve the tracker Start/Complete/Fail/Skip calls
            even when using engine.FinalizeWave. Map engine results to tracker
            state transitions.
        - scenario: Closed-loop gate retry logic lost during migration
          likelihood: medium
          impact: high
          mitigation: |
            Agent A must explicitly preserve the R3 closed-loop retry path.
            The engine FinalizeWave does not include it, so it must remain
            as post-engine-call logic in runFinalizeSteps.
        - scenario: extractConflictingFiles removal causes compile error
          likelihood: low
          impact: low
          mitigation: |
            Agent B must check all callers before removing either copy.
            grep for extractConflictingFiles across the entire web codebase.
        - scenario: Test streaming behavior changes when consolidating RunTests
          likelihood: medium
          impact: medium
          mitigation: |
            Agent B should keep the more sophisticated streaming implementation
            (io.Pipe + line-by-line) and verify test_output SSE events still
            stream incrementally, not as a single chunk.

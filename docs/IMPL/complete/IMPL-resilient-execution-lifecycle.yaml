pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Decomposed FinalizeWave diverges from engine.FinalizeWave behavior
          likelihood: medium
          impact: high
          mitigation: |
            Agent D must replicate the exact 8-step order from engine/finalize.go
            (including ValidateIntegration and FixGoMod). The interface contract
            specifies the step order. Post-merge verification runs the full test
            suite to catch divergence.
        - scenario: Pipeline state file left in inconsistent state after crash
          likelihood: low
          impact: medium
          mitigation: |
            pipelineTracker uses atomic write pattern (write to temp file, rename).
            Read always returns valid state or nil. Steps are idempotent.
        - scenario: Recovery handlers called while runWaveLoop is still active
          likelihood: medium
          impact: medium
          mitigation: |
            Recovery handlers check BOTH s.activeRuns (prevents retry while main
            loop is running) AND s.mergingRuns (prevents concurrent retries).
            Returns 409 Conflict if either guard is held. Frontend handles 409
            by showing "already in progress" instead of generic error.
        - scenario: Frontend TypeScript compilation fails due to new reducer state shape
          likelihood: low
          impact: low
          mitigation: |
            pipelineSteps is added as optional field (pipelineSteps?:) with
            default {}. Existing components and SEED_DISK_STATUS don't reference it.
            Only RecoveryControlsPanel uses it.
        - scenario: handleWaveFinalize still uses monolithic FinalizeWave after decomposition
          likelihood: low
          impact: high
          mitigation: |
            Agent D is explicitly tasked with updating handleWaveFinalize to use
            the same decomposed pipeline helper function as runWaveLoop. Both
            paths share a single runFinalizeSteps helper.
        - scenario: 'Multi-tab race: two users click Retry Step simultaneously'
          likelihood: low
          impact: low
          mitigation: |
            Server returns 409 for concurrent operations. RecoveryControlsPanel
            handles 409 gracefully by showing "already in progress" inline message.

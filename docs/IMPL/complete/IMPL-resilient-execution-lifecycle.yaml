        - id: D
          task: |
            ## What to Implement

            Modify `pkg/api/wave_runner.go` to use pipelineTracker for step-level
            state persistence during FinalizeWave, and modify `pkg/api/server.go`
            to register recovery routes and initialize the pipelineTracker.

            ### wave_runner.go changes:

            1. Replace the monolithic FinalizeWave call in runWaveLoop with individual
               step calls that record state via pipelineTracker. The new flow must
               match engine/finalize.go EXACTLY (8 steps, in order):

               ```
               tracker.Start(slug, waveNum, StepVerifyCommits)
               verifyResult, err := protocol.VerifyCommits(implPath, waveNum, repoPath)
               if err != nil { tracker.Fail(slug, waveNum, StepVerifyCommits, err); publish("run_failed"...); return }
               tracker.Complete(slug, waveNum, StepVerifyCommits)

               tracker.Start(slug, waveNum, StepScanStubs)
               // Assemble changedFiles from manifest completion reports:
               // manifest.Waves[waveNum-1].Agents -> CompletionReports -> FilesChanged + FilesCreated
               // ScanStubs is non-fatal: log error, still Complete the step
               tracker.Complete(slug, waveNum, StepScanStubs)

               tracker.Start(slug, waveNum, StepRunGates)
               // stateDir := filepath.Join(repoPath, ".saw-state")
               // cache := gatecache.New(stateDir, 5*time.Minute)
               // gateResults, err := protocol.RunGatesWithCache(manifest, waveNum, repoPath, cache)
               tracker.Complete(slug, waveNum, StepRunGates)

               tracker.Start(slug, waveNum, StepValidateIntegration)
               // protocol.ValidateIntegration(manifest, waveNum, repoPath) -- non-fatal
               // Also call protocol.AppendIntegrationReport on success
               tracker.Complete(slug, waveNum, StepValidateIntegration)

               tracker.Start(slug, waveNum, StepMergeAgents)
               // protocol.MergeAgents(implPath, waveNum, repoPath)
               tracker.Complete(slug, waveNum, StepMergeAgents)

               tracker.Start(slug, waveNum, StepFixGoMod)
               // protocol.FixGoModReplacePaths(repoPath) -- non-fatal
               tracker.Complete(slug, waveNum, StepFixGoMod)

               tracker.Start(slug, waveNum, StepVerifyBuild)
               // protocol.VerifyBuild(implPath, repoPath)
               tracker.Complete(slug, waveNum, StepVerifyBuild)

               tracker.Start(slug, waveNum, StepCleanup)
               // protocol.Cleanup(implPath, waveNum, repoPath) -- non-fatal
               tracker.Complete(slug, waveNum, StepCleanup)
               ```

            2. At the start of the finalization section, check if a previous pipeline
               state exists and resume from the last successful step:
               ```
               if ps := defaultPipelineTracker.Read(slug); ps != nil && ps.Wave == waveNum {
                 // Skip steps that already completed or were skipped
               }
               ```

            3. Keep the existing onStage callbacks alongside the new pipeline tracking.
               The stage_transition SSE events must still fire for UI backward compatibility.

            4. Also publish a new `pipeline_step` SSE event for each step transition:
               ```
               publish("pipeline_step", map[string]interface{}{
                 "slug": slug, "wave": waveNum,
                 "step": string(step), "status": string(status),
                 "error": errMsg,
               })
               ```

            5. The pipelineTracker is accessed via the package-level variable
               `defaultPipelineTracker` (set by server.go init). The runWaveLoop
               function checks for nil before using it.

            6. **IMPORTANT: Also update handleWaveFinalize** (the existing "Retry
               Finalization" endpoint at POST /api/wave/{slug}/finalize, lines 423-506
               of wave_runner.go). Currently it calls `engine.FinalizeWave` monolithically.
               Update it to use the same decomposed pipeline with tracker, so that
               "Retry Finalization" also emits pipeline_step events and updates
               pipeline state. This prevents an unwired connection where the "Retry
               Finalization" button bypasses the new pipeline tracker entirely.

               Extract the decomposed pipeline into a helper function (e.g.,
               `runFinalizeSteps(slug string, waveNum int, implPath string, repoPath string,
               publish func(string, interface{}))`) that both runWaveLoop and
               handleWaveFinalize can call. This avoids duplicating the step-by-step
               code.

            ### server.go changes:

            1. Add `pipelineTracker *pipelineTracker` field to Server struct.
            2. Initialize it in New() alongside stageManager:
               `pipelineTracker: newPipelineTracker(cfg.IMPLDir),`
            3. Set `defaultPipelineTracker = s.pipelineTracker` right after creation.
            4. Register recovery routes:

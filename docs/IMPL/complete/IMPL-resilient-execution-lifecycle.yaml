interface_contracts:
    - name: PipelineStep
      description: |
        Enum type representing each discrete step in the post-agent finalization
        pipeline. Must match the exact step order from engine/finalize.go FinalizeWave.
        Note: mark_complete is NOT a FinalizeWave step -- it runs separately after
        all waves complete via engine.MarkIMPLComplete. It is excluded from this enum.
      definition: |
        type PipelineStep string
        const (
          StepVerifyCommits       PipelineStep = "verify_commits"
          StepScanStubs           PipelineStep = "scan_stubs"
          StepRunGates            PipelineStep = "run_gates"
          StepValidateIntegration PipelineStep = "validate_integration"
          StepMergeAgents         PipelineStep = "merge_agents"
          StepFixGoMod            PipelineStep = "fix_go_mod"
          StepVerifyBuild         PipelineStep = "verify_build"
          StepCleanup             PipelineStep = "cleanup"
        )

        var PipelineStepOrder = []PipelineStep{
          StepVerifyCommits, StepScanStubs, StepRunGates,
          StepValidateIntegration, StepMergeAgents, StepFixGoMod,
          StepVerifyBuild, StepCleanup,
        }
      location: pkg/api/pipeline_state.go
    - name: PipelineState
      description: |
        Persisted state for a wave's finalization pipeline. Tracks which steps
        completed, which failed, and enables resume from the last successful step.
      definition: |
        type PipelineState struct {
          Slug      string                    `json:"slug"`
          Wave      int                       `json:"wave"`
          Steps     map[PipelineStep]StepState `json:"steps"`
          UpdatedAt time.Time                 `json:"updated_at"`
        }
        type StepState struct {
          Status    StepStatus `json:"status"`
          Error     string     `json:"error,omitempty"`
          Timestamp time.Time  `json:"timestamp"`
        }
        type StepStatus string
        const (
          StepPending  StepStatus = "pending"
          StepRunning  StepStatus = "running"
          StepComplete StepStatus = "complete"
          StepFailed   StepStatus = "failed"
          StepSkipped  StepStatus = "skipped"
        )
      location: pkg/api/pipeline_state.go
    - name: handleStepRetry
      description: |
        API endpoint POST /api/wave/{slug}/step/{step}/retry that retries a
        specific finalization step independently. Calls the corresponding
        engine/protocol function directly. Must check BOTH s.activeRuns and
        s.mergingRuns before proceeding.
      definition: |
        func (s *Server) handleStepRetry(w http.ResponseWriter, r *http.Request)
        // Request body: {"wave": int}
        // step path param: one of PipelineStep values
        // Returns 202 Accepted, streams progress via SSE
        // Returns 409 if activeRuns or mergingRuns guard is held
      location: pkg/api/recovery_handlers.go
    - name: handleStepSkip
      description: |
        API endpoint POST /api/wave/{slug}/step/{step}/skip that marks a
        finalization step as skipped and advances the pipeline. Only allowed
        for non-required steps (scan_stubs, validate_integration, run_gates
        when block_on_failure=false, cleanup, fix_go_mod).
      definition: |
        func (s *Server) handleStepSkip(w http.ResponseWriter, r *http.Request)
        // Request body: {"wave": int, "reason": string}
        // Returns 200 OK or 400 if step is not skippable
      location: pkg/api/recovery_handlers.go
    - name: handleForceMarkComplete
      description: |
        API endpoint POST /api/wave/{slug}/mark-complete that forces the IMPL
        to be marked complete regardless of pipeline state. Calls
        engine.MarkIMPLComplete directly, then clears pipeline state.
        Safety valve for when the pipeline is stuck but work is actually done.
      definition: |
        func (s *Server) handleForceMarkComplete(w http.ResponseWriter, r *http.Request)
        // No request body needed
        // Returns 200 OK with {"status":"complete"}
        // Calls pipelineTracker.Clear(slug) after marking complete
      location: pkg/api/recovery_handlers.go
    - name: handlePipelineState
      description: |
        API endpoint GET /api/wave/{slug}/pipeline that returns the current
        pipeline state for the latest wave, including step-level status.
        Returns 503 when defaultPipelineTracker is nil (not yet initialized).
      definition: |
        func (s *Server) handlePipelineState(w http.ResponseWriter, r *http.Request)
        // Returns PipelineState as JSON
        // Returns 503 if defaultPipelineTracker is nil
        // Returns 404 if no pipeline state exists for slug
      location: pkg/api/recovery_handlers.go
    - name: RecoveryControlsPanel
      description: |
        React component that renders manual recovery buttons (retry step, skip
        step, force complete) based on pipeline state derived from the reducer's
        pipelineSteps (live SSE data). Shown when a run has failed.
        Does NOT fetch pipeline state from the API separately -- uses
        state.pipelineSteps from the reducer as the single source of truth.
      definition: |
        interface RecoveryControlsPanelProps {
          slug: string
          wave: number
          pipelineSteps: Record<string, { status: string; error?: string }>
          onRetryStep: (step: string, wave: number) => Promise<void>
          onSkipStep: (step: string, wave: number, reason: string) => Promise<void>
          onForceComplete: () => Promise<void>
          onRetryFinalize: () => Promise<void>
        }
        export default function RecoveryControlsPanel(props: RecoveryControlsPanelProps): JSX.Element
      location: web/src/components/RecoveryControlsPanel.tsx
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Create `pkg/api/pipeline_state.go` with the PipelineStep enum, StepState,
            StepStatus, and PipelineState types. Implement a `pipelineTracker` that
            persists step-level state to `.saw-state/<slug>-pipeline.json`.

            The tracker must support:
            - `Start(slug, wave, step)` - marks step as running
            - `Complete(slug, wave, step)` - marks step as complete
            - `Fail(slug, wave, step, err)` - marks step as failed with error
            - `Skip(slug, wave, step)` - marks step as skipped
            - `Read(slug)` - returns current PipelineState (nil if none)
            - `Clear(slug)` - removes persisted state (called at run start)
            - `LastSuccessfulStep(slug)` - returns the last completed step for resume.
              IMPORTANT: skipped steps count as "passed" for resume purposes. When
              determining the last successful step, treat both StepComplete and
              StepSkipped as successful. This ensures that if scan_stubs is skipped
              and then merge_agents fails, resume skips both verify_commits (complete),
              scan_stubs (skipped), and run_gates (complete) correctly.

            Use the same pattern as the existing `stageManager` in `stage_state.go`:
            sync.Mutex for thread safety, JSON file persistence, load/save helpers.

            For atomic writes, use the temp-file + rename pattern: write to a temp file
            in the same directory, then os.Rename to the final path. This prevents
            partial writes if the process crashes mid-write. Note: the existing
            stageManager uses plain os.WriteFile -- this is a deliberate improvement.
            Pattern:
            ```go
            tmpPath := path + ".tmp"
            if err := os.WriteFile(tmpPath, data, 0o644); err != nil { return err }
            return os.Rename(tmpPath, path)
            ```

            The PipelineStep constants must match the FinalizeWave pipeline order
            from engine/finalize.go. Note: mark_complete is NOT a FinalizeWave step --
            it is called separately after all waves complete. Do NOT include it here.

            The correct step order (matching engine/finalize.go exactly):
            verify_commits -> scan_stubs -> run_gates -> validate_integration ->
            merge_agents -> fix_go_mod -> verify_build -> cleanup

            Also export a `PipelineStepOrder` slice that defines the canonical step ordering:
            ```go
            var PipelineStepOrder = []PipelineStep{
              StepVerifyCommits, StepScanStubs, StepRunGates,
              StepValidateIntegration, StepMergeAgents, StepFixGoMod,
              StepVerifyBuild, StepCleanup,
            }
            ```

            ## Interfaces to Implement

            PipelineStep type (string enum with 8 values), StepState struct, StepStatus type,
            PipelineState struct, pipelineTracker struct with methods listed above.

            ## Tests to Write

            1. TestPipelineTracker_StartComplete - start+complete a step, read back
            2. TestPipelineTracker_FailAndRead - fail a step, verify error persisted
            3. TestPipelineTracker_Skip - skip a step, verify status
            4. TestPipelineTracker_LastSuccessfulStep - verify correct step returned after partial completion
            5. TestPipelineTracker_LastSuccessfulStep_SkippedSteps - verify skipped steps count as passed for resume
            6. TestPipelineTracker_Clear - verify state is removed
            7. TestPipelineTracker_ConcurrentAccess - goroutine safety
            8. TestPipelineStepOrder - verify PipelineStepOrder has exactly 8 entries matching the enum

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./pkg/api/... && go test ./pkg/api/... -run TestPipelineTracker
            ```

            ## Constraints
            - Follow the same file persistence pattern as stageManager in stage_state.go but use temp+rename for atomic writes
            - State file goes in .saw-state/ directory (same as stage state)
            - Use slug-based filenames to avoid cross-IMPL collision
            - PipelineState.Steps must be a map, not a slice, for O(1) step lookup
            - Constructor: `func newPipelineTracker(implDir string) *pipelineTracker`
            - PipelineStepOrder must have exactly 8 entries (no mark_complete)
          files:
            - pkg/api/pipeline_state.go
            - pkg/api/pipeline_state_test.go
        - id: B
          task: |
            ## What to Implement

            Create `pkg/api/recovery_handlers.go` with four HTTP handlers for manual
            recovery control:

            1. `handleStepRetry` - POST /api/wave/{slug}/step/{step}/retry
               Body: {"wave": int}
               Concurrency guard: must check BOTH `s.activeRuns` (to ensure the main
               runWaveLoop isn't running) AND `s.mergingRuns` (to prevent concurrent
               retries). If either guard is held, return 409 Conflict with a message
               indicating what's in progress.

               Calls the corresponding engine/protocol function for the given step.
               IMPORTANT: Some steps require non-trivial setup before calling the
               protocol function. Here are the exact call patterns for each step:

               - "verify_commits":
                 ```go
                 result, err := protocol.VerifyCommits(implPath, wave, repoPath)
                 ```

               - "scan_stubs":
                 Must assemble changedFiles from the manifest's completion reports first:
                 ```go
                 manifest, err := protocol.Load(implPath)
                 // then collect changed files:
                 var changedFiles []string
                 if wave > 0 && wave <= len(manifest.Waves) {
                   for _, agent := range manifest.Waves[wave-1].Agents {
                     if report, ok := manifest.CompletionReports[agent.ID]; ok {
                       changedFiles = append(changedFiles, report.FilesChanged...)
                       changedFiles = append(changedFiles, report.FilesCreated...)
                     }
                   }
                 }
                 result, err := protocol.ScanStubs(changedFiles)
                 ```

               - "run_gates":
                 Must load the manifest and create a gate cache before calling:
                 ```go
                 manifest, err := protocol.Load(implPath)
                 stateDir := filepath.Join(repoPath, ".saw-state")
                 cache := gatecache.New(stateDir, 5*time.Minute)
                 results, err := protocol.RunGatesWithCache(manifest, wave, repoPath, cache)
                 ```
                 Imports needed: gatecache "github.com/blackwell-systems/scout-and-wave-go/pkg/gatecache"

               - "validate_integration":
                 ```go
                 manifest, err := protocol.Load(implPath)
                 report, err := protocol.ValidateIntegration(manifest, wave, repoPath)
                 ```
                 Non-fatal: log errors but treat as success.

               - "merge_agents":
                 ```go
                 result, err := protocol.MergeAgents(implPath, wave, repoPath)
                 ```

               - "fix_go_mod":
                 ```go
                 fixed, err := protocol.FixGoModReplacePaths(repoPath)
                 ```
                 Non-fatal: log errors but treat as success.

               - "verify_build":
                 ```go
                 result, err := protocol.VerifyBuild(implPath, repoPath)
                 ```

               - "cleanup":
                 ```go
                 result, err := protocol.Cleanup(implPath, wave, repoPath)
                 ```

               Returns 202, runs in background goroutine, publishes SSE events.

            2. `handleStepSkip` - POST /api/wave/{slug}/step/{step}/skip
               Body: {"wave": int, "reason": string}
               Skippable steps: scan_stubs, validate_integration, cleanup, fix_go_mod,
               run_gates (only when saw.config.json quality.block_on_failure is false).
               Non-skippable: verify_commits, merge_agents, verify_build.
               Returns 200 on success, 400 if step is not skippable.

            3. `handleForceMarkComplete` - POST /api/wave/{slug}/mark-complete
               No body. Calls engine.MarkIMPLComplete with full signature:
               ```go
               err := engine.MarkIMPLComplete(r.Context(), engine.MarkIMPLCompleteOpts{
                 IMPLPath: implPath,
                 RepoPath: repoPath,
                 Date:     time.Now().Format("2006-01-02"),
               })
               ```
               After success, also call `defaultPipelineTracker.Clear(slug)` to clean
               up stale pipeline state.
               Returns 200 with {"status":"complete"}.

            4. `handlePipelineState` - GET /api/wave/{slug}/pipeline
               Returns the pipeline state JSON. Uses defaultPipelineTracker.Read(slug).
               Returns 503 Service Unavailable if defaultPipelineTracker is nil
               (tracker not yet initialized -- e.g., during startup race).
               Returns 404 if no pipeline state exists.

            Each handler follows existing patterns: resolveIMPLPath for path resolution,
            makePublisher for SSE. Step path parameter values are safe for URL paths
            as-is (underscores are valid URL path characters, no encoding needed).

            ## Interfaces to Implement

            handleStepRetry, handleStepSkip, handleForceMarkComplete, handlePipelineState.

            ## Interfaces to Call

            - s.resolveIMPLPath(slug) - returns (implPath string, repoPath string, error)
            - s.makePublisher(slug) from wave_runner.go
            - engine.MarkIMPLComplete(ctx context.Context, opts engine.MarkIMPLCompleteOpts) error
              where MarkIMPLCompleteOpts has fields: IMPLPath string, RepoPath string, Date string
            - protocol.VerifyCommits(manifestPath string, waveNum int, repoDir string)
            - protocol.ScanStubs(files []string) - requires assembling files from manifest first
            - protocol.RunGatesWithCache(manifest *protocol.IMPLManifest, waveNumber int, repoDir string, cache *gatecache.Cache)
              - requires protocol.Load(implPath) to get *IMPLManifest
              - requires gatecache.New(stateDir, 5*time.Minute) to get *gatecache.Cache
            - protocol.ValidateIntegration(manifest *protocol.IMPLManifest, waveNum int, repoPath string)
            - protocol.MergeAgents(manifestPath string, waveNum int, repoDir string)
            - protocol.VerifyBuild(manifestPath string, repoDir string)
            - protocol.Cleanup(manifestPath string, waveNum int, repoDir string)
            - protocol.FixGoModReplacePaths(repoDir string) (bool, error)
            - defaultPipelineTracker.Read/Start/Complete/Fail/Skip/Clear (from Agent A)

            Note: At Wave 1 build time, pipelineTracker won't be wired yet. The handlers
            access it via the package-level `defaultPipelineTracker` variable. All handlers
            that touch the tracker must nil-check first:
            - handlePipelineState returns 503 when nil
            - handleStepRetry/handleStepSkip update tracker if non-nil, skip tracking if nil
            - handleForceMarkComplete calls Clear only if non-nil

            ## Tests to Write

            1. TestHandleStepRetry_InvalidStep - returns 400 for unknown step
            2. TestHandleStepRetry_MissingWave - returns 400 for wave < 1
            3. TestHandleStepSkip_NonSkippable - returns 400 for verify_commits
            4. TestHandleStepSkip_Skippable - returns 200 for scan_stubs
            5. TestHandleStepSkip_ValidateIntegration - returns 200 (new skippable step)
            6. TestHandleForceMarkComplete_Success - returns 200
            7. TestHandlePipelineState_NotFound - returns 404 when no state
            8. TestHandlePipelineState_TrackerNil - returns 503 when defaultPipelineTracker is nil

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./pkg/api/... && go test ./pkg/api/... -run TestHandle
            ```

            ## Constraints
            - Follow the exact handler pattern from merge_test_handlers.go (same structure)
            - handleStepRetry must check BOTH s.activeRuns and s.mergingRuns before proceeding
            - handleStepRetry must validate {step} path param against known PipelineStep values
            - Do NOT modify server.go or wave_runner.go - route registration happens in Wave 2
            - For the pipelineTracker dependency: define a package-level variable
              `var defaultPipelineTracker *pipelineTracker` that will be set during
              server init in Wave 2. All handlers nil-check before use.
            - handlePipelineState returns 503 when defaultPipelineTracker is nil
            - Import gatecache for run_gates retry: "github.com/blackwell-systems/scout-and-wave-go/pkg/gatecache"
          files:
            - pkg/api/recovery_handlers.go
            - pkg/api/recovery_handlers_test.go
        - id: C
          task: |
            ## What to Implement

            Create `web/src/components/RecoveryControlsPanel.tsx` - a React component
            that displays manual recovery controls when a pipeline step has failed.

            The panel shows:
            1. A list of pipeline steps with their status (pending/running/complete/failed/skipped)
            2. For failed steps: "Retry" button and (if skippable) "Skip" button
            3. A "Force Mark Complete" button at the bottom (styled as dangerous/destructive)
            4. A "Retry Full Finalization" button that calls the existing retryFinalize

            Props interface (uses pipelineSteps from the reducer, NOT a separate API fetch):
            ```typescript
            interface RecoveryControlsPanelProps {
              slug: string
              wave: number
              pipelineSteps: Record<string, { status: string; error?: string }>
              onRetryStep: (step: string, wave: number) => Promise<void>
              onSkipStep: (step: string, wave: number, reason: string) => Promise<void>
              onForceComplete: () => Promise<void>
              onRetryFinalize: () => Promise<void>
            }
            ```

            Note: the `pipelineSteps` prop is the live SSE-driven data from the
            waveEventsReducer, NOT a separately-fetched API response. This is the
            single source of truth for pipeline state in the UI.

            Step display order (matches engine/finalize.go exactly, no mark_complete):
            verify_commits, scan_stubs, run_gates, validate_integration,
            merge_agents, fix_go_mod, verify_build, cleanup.

            Skippable steps (show Skip button): scan_stubs, validate_integration,
            run_gates, cleanup, fix_go_mod.
            Non-skippable (no Skip button): verify_commits, merge_agents, verify_build.

            409 handling: When onRetryStep or onSkipStep returns a 409 error (detected
            by checking the error message or a status code), display an inline
            "Already in progress" message for that step instead of a generic error.
            This handles the multi-tab scenario where another tab already triggered
            a retry.

            Use the same Tailwind styling patterns as ConflictResolutionPanel.tsx and
            WaveBoard.tsx. Status indicators: green check for complete, red X for failed,
            blue pulse for running, gray dash for pending, yellow skip icon for skipped.

            ## Interfaces to Call

            Props are callbacks - the parent (WaveBoard) will wire them to API calls.
            This component is purely presentational + callback-driven.

            ## Tests to Write

            1. RecoveryControlsPanel renders step list - verify all 8 steps shown in correct order
            2. RecoveryControlsPanel shows retry button for failed step
            3. RecoveryControlsPanel shows skip button only for skippable steps
            4. RecoveryControlsPanel renders nothing when pipelineSteps is empty ({})
            5. Force complete button shows confirmation dialog before firing
            6. RecoveryControlsPanel shows "already in progress" on 409 error

            ## Verification Gate

            **pkg/format/detect.go:**

            ```go
            package format

            import (
                "os"
                "path/filepath"
            )

            type FormatConfig struct {
                Tool        string
                CheckCmd    string
                FixCmd      string
                Description string
            }

            func DetectFormatter(projectRoot string) FormatConfig {
                // Check go.mod → gofmt
                if _, err := os.Stat(filepath.Join(projectRoot, "go.mod")); err == nil {
                    return FormatConfig{
                        Tool:        "gofmt",
                        CheckCmd:    "gofmt -l .",
                        FixCmd:      "gofmt -w .",
                        Description: "Go: gofmt",
                    }
                }
                // Check package.json → prettier
                if _, err := os.Stat(filepath.Join(projectRoot, "package.json")); err == nil {
                    return FormatConfig{
                        Tool:        "prettier",
                        CheckCmd:    "npx prettier --check .",
                        FixCmd:      "npx prettier --write .",
                        Description: "TypeScript/JS: prettier",
                    }
                }
                // Check pyproject.toml or setup.py → ruff
                for _, marker := range []string{"pyproject.toml", "setup.py"} {
                    if _, err := os.Stat(filepath.Join(projectRoot, marker)); err == nil {
                        return FormatConfig{
                            Tool:        "ruff",
                            CheckCmd:    "ruff format --check .",
                            FixCmd:      "ruff format .",
                            Description: "Python: ruff format",
                        }
                    }
                }
                // Check Cargo.toml → cargo fmt
                if _, err := os.Stat(filepath.Join(projectRoot, "Cargo.toml")); err == nil {
                    return FormatConfig{
                        Tool:        "cargo-fmt",
                        CheckCmd:    "cargo fmt --check",
                        FixCmd:      "cargo fmt",
                        Description: "Rust: cargo fmt",
                    }
                }
                return FormatConfig{} // no formatter detected
            }
            ```

            **pkg/format/detect_test.go:**
            Write table-driven tests using os.MkdirTemp. Create marker files in temp dirs
            and assert DetectFormatter returns the expected Tool, CheckCmd, FixCmd.
            Test cases: go.mod → gofmt, package.json → prettier, pyproject.toml → ruff,
            Cargo.toml → cargo-fmt, empty dir → zero value.
            Priority order test: go.mod takes precedence over package.json when both exist.

            **pkg/errparse/format_parsers.go:**
            Implement format parsers for gofmt, prettier, ruff, and cargo-fmt output.

            - gofmt -l outputs filenames of unformatted files (one per line, no prefix).
              Parser: split stdout by newline, each non-empty line is a StructuredError{
                  File: line, Severity: "warning", Message: "file is not gofmt-formatted",
                  Tool: "gofmt" }
            - prettier --check outputs filenames prefixed with "Checking " and uses exit 1.
              Parser: look for lines matching "^Checking " or lines in the "[warn]" section.
              Each unformatted file → StructuredError{File, Severity:"warning",
                  Message:"file is not prettier-formatted", Tool:"prettier"}
            - ruff format --check outputs "Would reformat: <file>" lines.
              Parser: lines matching "^Would reformat: " → StructuredError{File: ...,
                  Severity:"warning", Message:"file needs ruff format", Tool:"ruff-format"}
            - cargo fmt --check outputs "Diff in <file>:" lines.
              Parser: lines starting "Diff in " → extract filename up to ":" →
                  StructuredError{File, Severity:"warning", Message:"file needs cargo fmt",
                  Tool:"cargo-fmt"}

            Also update `DetectTool` in pkg/errparse/registry.go to detect format tools:

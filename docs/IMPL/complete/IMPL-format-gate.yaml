pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            Agent B imports pkg/format/ which Agent A creates in the same wave.
            Parallel worktrees will not have each other's new packages at build time,
            causing Agent B's go build ./... to fail with "cannot find package".
          likelihood: high
          impact: medium
          mitigation: |-
            Agent B's verification gate is scoped to go build ./pkg/protocol/... (not
            ./...) to avoid the missing format package. Agent B should create a minimal
            stub pkg/format/detect.go in its worktree ONLY for compilation purposes,
            clearly marked as a temporary stub. At merge time, Agent A's real
            implementation overwrites the stub. This is documented in Agent B's
            constraints section.
        - scenario: |-
            gofmt -l . outputs relative paths (e.g. "main.go") while the StructuredError.File
            field is expected to be a file path. If the web UI or CLI tries to open the file
            by path, relative paths may fail when the working directory differs.
          likelihood: medium
          impact: low
          mitigation: |-
            The gofmt parser in format_parsers.go should note that paths are relative to
            the project root (repoDir). The GateResult already captures stdout as a string;
            ParsedErrors is advisory for display. No path resolution is needed at parse time.
        - scenario: |-
            prettier --check output format varies by version (v2 vs v3 differ in output
            format). The prettier parser may miss unformatted files.
          likelihood: medium
          impact: low
          mitigation: |-
            The prettier parser should be conservative: parse both "Checking " prefix lines
            (v2) and "warn" keyword lines (v3). Since ParsedErrors is advisory (the real
            pass/fail comes from exit code), a missed parse does not affect correctness.
        - scenario: |-
            Cache invalidation in fix mode calls cache.Invalidate() which removes ALL
            cached gate results, not just the format gate. This means subsequent lint/test
            gates that were cached will re-run unnecessarily.
          likelihood: high
          impact: low
          mitigation: |-
            This is intentional and correct. When format changes files, all previously
            cached gate results are stale (e.g., lint ran on pre-format code). Invalidating
            the full cache ensures accurate results. The TTL is 5 minutes; the overhead
            of re-running lint/test is acceptable. Document this behavior in runFormatGate.
        - scenario: |-
            The go.mod marker is present in scout-and-wave-go but the test repos used
            in pkg/format/detect_test.go are temp dirs. If a test creates a temp dir
            that happens to be inside the repo root, DetectFormatter may walk up and
            find the real go.mod, causing test interference.
          likelihood: low
          impact: low
          mitigation: |-
            DetectFormatter only checks the given projectRoot — it does not walk parent
            directories. Tests use os.MkdirTemp (outside the repo) and create marker files
            explicitly. No directory walk means no interference.

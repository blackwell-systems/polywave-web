interface_contracts:
    - name: FormatConfig
      description: |-
        Toolchain detection result and formatter command for a given project root.
        Returned by DetectFormatter. Zero value (Tool == "") means no formatter detected.
      definition: |-
        // In pkg/format/detect.go
        package format

        // FormatConfig describes the formatter for a project.
        type FormatConfig struct {
            Tool        string // "gofmt", "prettier", "ruff", "cargo-fmt", ""
            CheckCmd    string // command to run in check/report mode (exit 1 if unformatted)
            FixCmd      string // command to run in fix/write mode (rewrites files in place)
            Description string // human-readable description, e.g. "Go: gofmt -l ./..."
        }

        // DetectFormatter inspects the project root for known toolchain marker files
        // and returns the appropriate FormatConfig. Returns zero FormatConfig if
        // no known formatter is detected.
        //
        // Detection priority:
        //   go.mod      → gofmt (CheckCmd: "gofmt -l .", FixCmd: "gofmt -w .")
        //   package.json → prettier (CheckCmd: "npx prettier --check .", FixCmd: "npx prettier --write .")
        //   pyproject.toml or setup.py → ruff (CheckCmd: "ruff format --check .", FixCmd: "ruff format .")
        //   Cargo.toml  → cargo fmt (CheckCmd: "cargo fmt --check", FixCmd: "cargo fmt")
        //
        // When Command is set on the gate (non-empty), DetectFormatter is bypassed
        // and the caller's explicit Command is used as-is.
        func DetectFormatter(projectRoot string) FormatConfig
      location: pkg/format/detect.go
    - name: QualityGate.Fix
      description: |-
        New boolean field on QualityGate struct. When true, the gate runs in
        fix/write mode (auto-applies formatting). When false (default), runs in
        check mode (reports unformatted files, returns non-zero exit). Only
        meaningful for type="format" gates; ignored for all other gate types.
      definition: |-
        // In pkg/protocol/types.go — modified QualityGate struct
        type QualityGate struct {
            Type        string `yaml:"type" json:"type"`
            Command     string `yaml:"command" json:"command"`
            Required    bool   `yaml:"required" json:"required"`
            Description string `yaml:"description,omitempty" json:"description,omitempty"`
            Repo        string `yaml:"repo,omitempty" json:"repo,omitempty"`
            Fix         bool   `yaml:"fix,omitempty" json:"fix,omitempty"` // NEW: fix mode for format gates
        }
      location: pkg/protocol/types.go
    - name: runFormatGate
      description: |-
        Internal function in gates.go that handles a format gate. Called from
        the RunGates/RunGatesWithCache loop when gate.Type == "format".
        Detects formatter (or uses gate.Command), runs in check or fix mode,
        and invalidates the cache when fix mode modifies files.
      definition: |-
        // In pkg/protocol/gates.go (unexported helper)
        //
        // runFormatGate executes a format gate for the given project root.
        // If gate.Fix is true, runs in fix mode (auto-applies) and invalidates
        // cache (since files changed). Otherwise runs in check mode.
        // Returns a fully-populated GateResult.
        func runFormatGate(gate QualityGate, repoDir string, cache *gatecache.Cache) GateResult
      location: pkg/protocol/gates.go

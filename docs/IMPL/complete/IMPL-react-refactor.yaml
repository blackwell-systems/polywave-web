verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: The work spans 30+ files across 4 waves. Each wave targets
       disjoint file sets — Wave 1 creates new extraction files, Wave 2 decomposes existing
       god components into new sub-components, Wave 3 creates new context/hook files, and
       Wave 4 reorganizes directory structure. No two agents in any wave touch the same file.

    2. Investigation-first items: None. The audit findings are well-defined refactoring
       tasks with clear before/after states. No unknown root causes.

    3. Interface discoverability: Yes. All cross-agent interfaces can be defined upfront:
       the SawClient interface for the API client, shared component prop interfaces for
       extracted components, and context provider shapes for state unification.

    4. Pre-implementation status: All items are TODO. No partial implementations exist
       for any of the extraction targets (apiClient.ts, useModal hook, AppLayout, etc.).

    5. Parallelization value: High. Wave 1 has 4 independent agents each touching 2-4 files.
       Wave 2 has 3 independent agents decomposing large components. Build+test cycle is
       ~15s (tsc + vitest) but agents do substantial code extraction work (3-6 files each).
       4 waves with 3-4 agents per wave = significant parallelization benefit.

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~25 min (13 agents, ~8 min avg, 4 waves with parallelism)
    - Merge & verification: ~10 min (4 wave merges)
    Total SAW time: ~43 min

    Sequential baseline: ~104 min (13 agents x 8 min avg)
    Time savings: ~61 min (59% faster)

    Recommendation: Clear speedup. Proceed.

pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Wave 2 agents modifying App.tsx/WaveBoard.tsx/ReviewScreen.tsx may conflict with recent feature additions
          likelihood: medium
          impact: medium
          mitigation: Each agent owns exactly one god component. Merge conflicts are limited to import statements which are easy to resolve.
        - scenario: API client wrapper breaks subtle behavior in fetch error handling
          likelihood: low
          impact: high
          mitigation: Wave 4 uses thin re-export wrappers that delegate to sawClient methods. Original functions preserved. Tests catch regressions.
        - scenario: Context providers cause unnecessary re-renders in deeply nested components
          likelihood: medium
          impact: low
          mitigation: Use useMemo for context values. AppContext changes infrequently (config loads). ReviewContext is scoped to review screen.
        - scenario: TypeScript compilation fails at wave boundary due to missing imports from extracted components
          likelihood: medium
          impact: medium
          mitigation: Each wave creates new files first, then modifies existing files. Typecheck gate runs at every wave boundary.
        - scenario: Directory reorganization (Wave 4 originally) descoped — leaves flat directory structure
          likelihood: high
          impact: low
          mitigation: Descoped to keep IMPL manageable. Directory reorg can be a follow-up IMPL after contexts are wired in.

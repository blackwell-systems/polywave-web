      agents:
        - id: A
          task: |
            ## Agent A — Extract API Client Layer

            **What to implement:**
            Create `web/src/lib/apiClient.ts` with the `SawClient` interface and `createHttpClient()` factory.

            **Detailed instructions:**
            1. Define the `SawClient` interface with namespaced methods as specified in the interface contract.
            2. Implement `createHttpClient()` that creates an HTTP-based implementation wrapping all existing
               fetch() calls from `api.ts`, `autonomyApi.ts`, and `programApi.ts`.
            3. Each method should follow the existing error pattern: `if (!r.ok) throw new Error(...)`.
            4. Import types from `../types.ts`, `../types/autonomy.ts`, `../types/program.ts`, `../types/filebrowser.ts`.
            5. Export both the interface and the factory function as the default client instance:
               `export const sawClient = createHttpClient()`.
            6. Also re-export all types that `api.ts` currently exports (DiskAgentStatus, DiskWaveStatus, BrowseResult).
            7. Write tests in `apiClient.test.ts` — test that the client object has the correct shape
               and that methods call fetch with correct URLs (mock fetch).

            **Constraints:**
            - Do NOT modify api.ts, autonomyApi.ts, or programApi.ts yet — they remain as-is for backward
              compatibility. Migration of consumers happens in Wave 4.
            - Do NOT add new dependencies.
            - Preserve all existing type exports so nothing breaks.

            **Tests to write or update:**
            - `web/src/lib/apiClient.test.ts` — shape tests, fetch URL tests for 3-4 representative methods.

            **Verification gate:**
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit && node_modules/.bin/vitest run
            ```
          files:
            - web/src/lib/apiClient.ts
            - web/src/lib/apiClient.test.ts
        - id: B
          task: |

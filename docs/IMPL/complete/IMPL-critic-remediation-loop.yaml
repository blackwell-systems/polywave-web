interface_contracts:
    - name: AutoFixCriticRequest
      description: JSON request body for POST /api/impl/{slug}/auto-fix-critic
      definition: |
        // Go struct in pkg/api/critic_handler.go
        type AutoFixCriticRequest struct {
            DryRun bool `json:"dry_run,omitempty"` // if true, return planned fixes without applying
        }

        // TypeScript type in web/src/types.ts
        export interface AutoFixCriticRequest {
            dry_run?: boolean;
        }
      location: pkg/api/critic_handler.go
    - name: AutoFixCriticResponse
      description: JSON response from POST /api/impl/{slug}/auto-fix-critic including new critic result
      definition: |
        // Go struct in pkg/api/critic_handler.go
        type AutoFixCriticResponse struct {
            FixesApplied []AppliedFix   `json:"fixes_applied"`
            FixesFailed  []FailedFix    `json:"fixes_failed"`
            NewResult    *CriticResult  `json:"new_result,omitempty"` // nil if dry_run
            AllResolved  bool           `json:"all_resolved"`
        }
        type AppliedFix struct {
            Check       string `json:"check"`       // e.g. "file_existence"
            AgentID     string `json:"agent_id"`
            Description string `json:"description"` // human-readable summary
        }
        type FailedFix struct {
            Check       string `json:"check"`
            AgentID     string `json:"agent_id"`
            Reason      string `json:"reason"`      // why auto-fix failed
        }

        // TypeScript mirrors in web/src/types.ts
        export interface AutoFixCriticResponse {
            fixes_applied: AppliedFix[];
            fixes_failed: FailedFix[];
            new_result?: CriticResult;
            all_resolved: boolean;
        }
        export interface AppliedFix {
            check: string;
            agent_id: string;
            description: string;
        }
        export interface FailedFix {
            check: string;
            agent_id: string;
            reason: string;
        }
      location: pkg/api/critic_handler.go
    - name: autoFixCritic API client method
      description: Frontend API client method calling POST /api/impl/{slug}/auto-fix-critic
      definition: |
        // Added to sawClient.impl in web/src/lib/apiClient.ts
        async autoFixCritic(slug: string, dryRun?: boolean): Promise<AutoFixCriticResponse> {
            const r = await fetch(`/api/impl/${enc(slug)}/auto-fix-critic`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dry_run: dryRun }),
            });
            if (!r.ok) throw new Error(await r.text());
            return r.json() as Promise<AutoFixCriticResponse>;
        }
      location: web/src/lib/apiClient.ts
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Add the orchestrator-level auto-fix-critic endpoint to pkg/api/critic_handler.go.
            This endpoint reads the existing critic report from the IMPL manifest, determines
            which errors are auto-fixable, applies fixes (reusing existing handleFixCritic logic),
            re-validates with `sawtools validate --fix`, re-runs critic, and returns results.

            ### New types to add (in pkg/api/critic_handler.go):

            ```go
            type AutoFixCriticRequest struct {
                DryRun bool `json:"dry_run,omitempty"`
            }
            type AutoFixCriticResponse struct {
                FixesApplied []AppliedFix              `json:"fixes_applied"`
                FixesFailed  []FailedFix               `json:"fixes_failed"`
                NewResult    *protocol.CriticResult     `json:"new_result,omitempty"`
                AllResolved  bool                       `json:"all_resolved"`
            }
            type AppliedFix struct {
                Check       string `json:"check"`
                AgentID     string `json:"agent_id"`
                Description string `json:"description"`
            }
            type FailedFix struct {
                Check       string `json:"check"`
                AgentID     string `json:"agent_id"`
                Reason      string `json:"reason"`
            }
            ```

            ### New handler: handleAutoFixCritic (POST /api/impl/{slug}/auto-fix-critic)

            Algorithm:
            1. Load manifest via protocol.Load(implPath)
            2. Get critic report via protocol.GetCriticReview(manifest)
            3. For each agent_review with issues, classify each issue:
               - `file_existence` or `side_effect_completeness` with severity "error" and a file field:
                 Apply add_file_ownership fix (append to manifest.FileOwnership)
               - `symbol_accuracy` with "expected X, found Y" pattern in description:
                 Apply update_contract fix (string replace in contract definition)
               - All other types: add to FixesFailed with reason "no auto-fix available"
            4. Save manifest via protocol.Save()
            5. Run `sawtools validate --fix` via exec.Command
            6. Unless dry_run, run `sawtools run-critic <implPath>` synchronously (with timeout)
            7. Reload manifest and return AutoFixCriticResponse with new critic result
            8. Emit SSE events: `critic_autofix_started`, `critic_autofix_complete` via globalBroker

            ### Route registration

            Add to RegisterCriticRoutes() in pkg/api/impl.go:
            ```go
            s.mux.HandleFunc("POST /api/impl/{slug}/auto-fix-critic", s.handleAutoFixCritic)
            ```

            NOTE: RegisterCriticRoutes is defined in impl.go (line 629), NOT in critic_handler.go.
            You must modify impl.go ONLY to add the one HandleFunc line. The handler implementation
            goes in critic_handler.go.

            WAIT — impl.go is not in your file ownership. Instead, add a new registration function
            in critic_handler.go:
            ```go
            func (s *Server) RegisterAutoFixRoutes() {
                s.mux.HandleFunc("POST /api/impl/{slug}/auto-fix-critic", s.handleAutoFixCritic)
            }
            ```
            This will be wired in the integration wave.

            ### Tests (in critic_handler_test.go)

            Add tests for handleAutoFixCritic:
            - TestAutoFixCritic_NoReport: returns error when no critic report exists
            - TestAutoFixCritic_FileExistence: verifies file_existence errors get auto-fixed
            - TestAutoFixCritic_UnfixableError: verifies unknown check types land in fixes_failed
            - TestAutoFixCritic_DryRun: verifies dry_run returns planned fixes without applying

            Use the existing test patterns in critic_handler_test.go (httptest.NewRecorder, etc.).

            ### Constraints
            - Do NOT modify impl.go (owned by integration wave)
            - Reuse protocol.Load/Save/GetCriticReview — do not parse YAML manually
            - The synchronous critic re-run should have a 3-minute timeout
            - Use criticCommandFunc (already defined, overridable in tests)
          files:
            - pkg/api/critic_handler.go
            - pkg/api/critic_handler_test.go
        - id: B
          task: |
            ## What to implement

            Add TypeScript types and API client method for the auto-fix-critic endpoint.

            ### Types to add in web/src/types.ts (append after CriticFixRequest):

            ```typescript
            export interface AutoFixCriticRequest {

title: Critic-to-Remediation Loop in Web UI
feature_slug: critic-remediation-loop
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: 6 files across backend (Go) and frontend (TypeScript/React),
       cleanly separable into 3 agents with disjoint ownership. Backend auto-fix handler
       is independent of frontend UI work; TypeScript types bridge both but are owned
       by a single agent.

    2. Investigation-first items: None. The critic handler, CriticReviewPanel, and
       amend_handler already exist. The gap is well-defined: wire auto-fix orchestration
       on the backend and surface it in the frontend.

    3. Interface discoverability: Yes. The API contract (POST auto-fix-critic) and
       the TypeScript types can be fully defined before implementation.

    4. Pre-implementation status check:
       - handleFixCritic (PATCH fix-critic): EXISTS — handles single fix types
         (add_file_ownership, update_contract, add_integration_connector). PARTIAL.
       - handleAmendImpl (POST amend): EXISTS — supports redirect-agent, add-wave,
         extend-scope. DONE for its scope.
       - CriticReviewPanel: EXISTS with IssueFixer per-issue. PARTIAL — no "Fix All"
         button, no inline editor fallback, no auto-fix-then-rerun loop.
       - useCriticState hook: EXISTS — manages critic lifecycle. PARTIAL — no
         applyCriticFix or autoFixCritic methods.
       - ReviewScreen: EXISTS but passes CriticReviewPanel WITHOUT onApplyFix or
         onRerunCritic props. TODO — must wire props.

    5. Parallelization value: 3 agents, build+test cycle >30s (Go build + npm test),
       agents touch 2-3 files each. Clear speedup.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (3 agents x 8 min avg, single wave)
    - Merge & verification: ~4 min
    Total SAW time: ~24 min

    Sequential baseline: ~30 min (3 agents x 10 min avg)
    Time savings: ~6 min (20% faster)

    Recommendation: Clear speedup. Proceed.

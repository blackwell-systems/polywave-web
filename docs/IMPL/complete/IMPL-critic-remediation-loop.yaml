            ```

            2. Add "Fix All Issues" button in the verdict banner area (next to the
            verdict badge), visible when verdict is ISSUES and onAutoFixAll is provided:
            ```tsx
            {!isPass && onAutoFixAll && (
                <button
                    onClick={(e) => { e.stopPropagation(); onAutoFixAll(); }}
                    disabled={autoFixRunning}
                    className="flex items-center gap-2 text-xs font-medium px-3 py-1.5 rounded-none border border-primary/30 bg-transparent text-primary hover:bg-primary/5 transition-colors disabled:opacity-50"
                >
                    {autoFixRunning ? 'Fixing...' : 'Fix All Issues'}
                </button>
            )}
            ```

            3. Add "Edit IMPL" button in the footer area (next to "Re-run Critic"),
            visible when onToggleEditor is provided and verdict is ISSUES:
            ```tsx
            {!isPass && onToggleEditor && (
                <button
                    onClick={onToggleEditor}
                    className="flex items-center gap-2 text-xs font-medium px-3 py-1.5 rounded-none border border-border bg-background text-foreground hover:bg-muted transition-colors"
                >
                    Edit IMPL
                </button>
            )}
            ```

            4. Add inline ImplEditor below the footer when showEditor is true and slug
            is provided:
            ```tsx
            {showEditor && slug && (
                <div className="border-t border-border">
                    <ImplEditor slug={slug} />
                </div>
            )}
            ```

            Import ImplEditor at top:
            ```typescript
            import ImplEditor from './ImplEditor'
            ```

            5. Update the existing IssueFixer component: when fixStatus.state is 'success',
            show a brief "Re-running critic..." indicator if the parent is doing a re-run.

            ### Constraints
            - All new buttons must use the unified style: transparent bg, colored border
              (matching the existing "Re-run Critic" button pattern)
            - Do NOT modify ImplEditor.tsx — use it as-is
            - Keep all existing CriticReviewPanel functionality intact
            - The component must remain functional even when new optional props are not passed
              (backward compatible — ReviewScreen currently passes no fix props)
          files:
            - web/src/components/CriticReviewPanel.tsx
            - web/src/hooks/useCriticState.ts

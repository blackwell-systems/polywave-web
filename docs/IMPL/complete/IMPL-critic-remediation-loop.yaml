            }
            ```

            ### API client method in web/src/lib/apiClient.ts

            Add to the `impl` namespace object (after the existing `applyCriticFix` method):

            ```typescript
            async autoFixCritic(slug: string, dryRun?: boolean): Promise<AutoFixCriticResponse> {
                const r = await fetch(`/api/impl/${enc(slug)}/auto-fix-critic`, {
                    method: 'POST',

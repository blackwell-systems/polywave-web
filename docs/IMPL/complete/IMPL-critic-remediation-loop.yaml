            ```

            Also add the import for `AutoFixCriticResponse` at the top of apiClient.ts
            (it already imports CriticResult and CriticFixRequest from '../types').

            ### Constraints
            - Keep existing types and methods unchanged
            - Follow the exact naming convention used by existing types (e.g., CriticFixRequest)
            - The enc() helper already exists in apiClient.ts — reuse it
          files:

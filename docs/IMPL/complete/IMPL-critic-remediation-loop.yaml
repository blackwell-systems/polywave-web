        - id: C
          task: |
            ## What to implement

            Enhance CriticReviewPanel with "Fix All Issues" button, per-issue auto-fix
            progress, inline IMPL editor fallback, and wire useCriticState to support
            the remediation loop.

            ### Changes to web/src/hooks/useCriticState.ts

            Add to CriticState interface and hook return:
            ```typescript
            /** Apply a single critic fix */
            applyCriticFix: (fix: CriticFixRequest) => Promise<void>;
            /** Run auto-fix for all fixable issues, re-validate, re-run critic */
            autoFixAll: () => Promise<void>;
            /** Whether auto-fix is in progress */
            autoFixRunning: boolean;
            /** Auto-fix result summary (null when not run) */
            autoFixResult: AutoFixCriticResponse | null;
            ```

            Implementation:
            - `applyCriticFix`: call `sawClient.impl.applyCriticFix(slug, fix)`, then
              `fetchCritic()` to refresh the report. Emit SSE-compatible state updates.
            - `autoFixAll`: call `sawClient.impl.autoFixCritic(slug)` (the new endpoint
              from Agent A/B). On success, update criticReport from response.new_result.
              Set autoFixRunning during execution.
            - Add `autoFixRunning` and `autoFixResult` state variables.

            NOTE: The API client methods `applyCriticFix` and `autoFixCritic` already exist
            (or will exist after Agent B). Since agents run in parallel, you must define
            the fetch calls inline if the apiClient import would fail at build time:
            ```typescript
            // Inline fetch as fallback if apiClient method not available at build time
            const r = await fetch(`/api/impl/${slug}/auto-fix-critic`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({}),
            });
            ```
            Actually — sawClient.impl.applyCriticFix already exists in apiClient.ts.
            Only autoFixCritic is new (Agent B adds it). Use inline fetch for autoFixCritic
            to avoid build dependency on Agent B's work.

            ### Changes to web/src/components/CriticReviewPanel.tsx

            1. Add new props to CriticReviewPanelProps:
            ```typescript
            interface CriticReviewPanelProps {
                result: CriticResult;
                onApplyFix?: (fix: CriticFixRequest) => Promise<void>;
                onRerunCritic?: () => void;
                criticRunning?: boolean;
                onAutoFixAll?: () => Promise<void>;
                autoFixRunning?: boolean;
                showEditor?: boolean;       // whether to show inline editor
                onToggleEditor?: () => void; // toggle inline editor visibility
                slug?: string;              // needed for ImplEditor

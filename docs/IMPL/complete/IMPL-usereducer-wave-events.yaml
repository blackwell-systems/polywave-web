title: Refactor useWaveEvents hook to useReducer pattern
feature_slug: usereducer-wave-events
verdict: SUITABLE
suitability_assessment: |
    The useWaveEvents hook contains ~400 lines with 20+ SSE event handlers that each
    call setState with complex update logic. The refactoring cleanly splits into:
    (A) a pure reducer function with typed actions and exhaustive tests, and
    (B) the hook wiring that replaces useState/setState with useReducer/dispatch.

    Agent A owns the reducer file (pure function, no React dependencies beyond types)
    and its test file. Agent B owns the hook file refactoring. Both can work in
    parallel because the interface contract (WaveAction union type + reducer signature)
    is fully specifiable upfront.

    All existing exports (AppWaveState, WaveMergeState, WaveTestState, StageEntry,
    StaleBranchesInfo, useWaveEvents) must be preserved — consumers (WaveBoard,
    useExecutionSync, StageTimeline) must not need changes.
test_command: cd web && npx vitest run
lint_command: cd web && npx tsc --noEmit

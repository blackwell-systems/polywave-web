          files:
            - web/src/hooks/waveEventsReducer.ts
            - web/src/hooks/waveEventsReducer.test.ts
    - number: 2
      agents:
        - id: B
          task: |
            ## What to Implement

            Refactor `web/src/hooks/useWaveEvents.ts` to use the reducer from
            `./waveEventsReducer`. The file should shrink from ~457 lines to ~80-100
            lines. The refactored hook:

            1. **Replaces `useState<AppWaveState>` with `useReducer(waveEventsReducer, initialWaveState)`.**

            2. **Removes all type/interface definitions** (AppWaveState, WaveMergeState,
               WaveTestState, StageEntry, StaleBranchesInfo) — these now live in
               waveEventsReducer.ts. Re-export them from this file for backward
               compatibility:
               ```ts
               export type { AppWaveState, WaveMergeState, WaveTestState, StageEntry, StaleBranchesInfo } from './waveEventsReducer'
               ```

            3. **Removes helper functions** (upsertAgent, buildWaves) — now in the reducer.

            4. **Replaces every `setState(prev => ...)` call with `dispatch({ type: ... })`.**
               Each SSE addEventListener callback becomes a thin dispatcher:
               ```ts
               es.addEventListener('agent_started', (event: MessageEvent) => {
                 const data = JSON.parse(event.data)
                 dispatch({ type: 'AGENT_STARTED', agent: data.agent, wave: data.wave, files: data.files })
               })
               ```

            5. **Refactors disk-status seeding** to dispatch SEED_DISK_STATUS with the
               pre-processed data (agent mapping, scaffold status, merged waves).
               The disk-status useEffect still does the fetch + data transformation,
               but calls `dispatch({ type: 'SEED_DISK_STATUS', ... })` instead of setState.

            6. **Refactors connection state** — `es.onopen` dispatches CONNECT,
               `es.onerror` dispatches DISCONNECT.

            ## Interfaces to Implement

            - `useWaveEvents(slug: string): AppWaveState` — same signature, same return type

            ## Interfaces to Call

            - `waveEventsReducer`, `initialWaveState`, `WaveAction` from `./waveEventsReducer`
            - `fetchDiskWaveStatus` from `../api`
            - React `useReducer`, `useEffect`, `useRef`

            ## Tests to Write

            Create `web/src/hooks/useWaveEvents.test.ts` with vitest + @testing-library/react.
            These are integration tests verifying the hook dispatches correctly when SSE
            events arrive.

            1. TestInitialState — hook returns initialWaveState on mount
            2. TestConnectedOnOpen — hook sets connected: true when EventSource opens
            3. TestAgentStartedDispatch — mock EventSource fires agent_started, verify
               state.agents contains the new agent with status 'running'
            4. TestRunCompleteDispatch — mock EventSource fires run_complete, verify
               state.runComplete is true
            5. TestCleanup — hook closes EventSource on unmount

            Use a minimal EventSource mock (vi.stubGlobal) that captures addEventListener
            calls and allows firing events programmatically.

            ## Verification Gate

            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit && npx vitest run src/hooks/useWaveEvents.test.ts src/hooks/useExecutionSync.test.ts
            ```

            Run useExecutionSync.test.ts too — it mocks useWaveEvents and verifies the
            public API contract. If those tests pass, the refactoring preserved the
            interface correctly.

            ## Constraints

            - MUST preserve all existing exports: `useWaveEvents`, `AppWaveState`,
              `WaveMergeState`, `WaveTestState`, `StageEntry`, `StaleBranchesInfo`.
              Use `export type { ... } from './waveEventsReducer'` for type re-exports.
            - MUST NOT change the return type of useWaveEvents.
            - MUST NOT modify any consumer files (WaveBoard.tsx, useExecutionSync.ts,
              StageTimeline.tsx).
            - The EventSource setup and cleanup logic stays in this file — only the
              state management moves to the reducer.
            - Keep the esRef for cleanup. The useReducer dispatch is stable across
              renders (unlike setState, but same practical effect here).
          files:
            - web/src/hooks/useWaveEvents.ts
            - web/src/hooks/useWaveEvents.test.ts
          dependencies:
            - A

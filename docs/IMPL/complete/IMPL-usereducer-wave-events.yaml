            ## Verification Gate

            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit && npx vitest run src/hooks/waveEventsReducer.test.ts
            ```

            ## Constraints

            - This is a NEW file — do not modify useWaveEvents.ts (owned by Agent B).
            - The reducer must be a pure function — no side effects, no API calls.
            - State shape (AppWaveState) must exactly match the current interface.
            - Map objects (wavesMergeState, wavesTestState) must be new Map instances
              on every mutation (React immutability requirement).
            - All type interfaces (AppWaveState, WaveMergeState, etc.) move to this
              file but must also be re-exported so existing imports keep working

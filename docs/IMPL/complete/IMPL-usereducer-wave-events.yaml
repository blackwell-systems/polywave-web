          task: |
            ## What to Implement

            Create `web/src/hooks/waveEventsReducer.ts` containing:

            1. **`WaveAction` discriminated union type** — One variant per SSE event type
               plus internal actions (CONNECT, DISCONNECT, SEED_DISK_STATUS). Use

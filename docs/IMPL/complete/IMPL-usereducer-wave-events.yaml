            4. **`upsertAgent` helper** — Extracted from the current inner function
               (lines 141-162). Takes state + agent ID + wave + partial update, returns
               new state with updated agents and rebuilt waves.

            5. **`waveEventsReducer` function** — `(state: AppWaveState, action: WaveAction) => AppWaveState`.
               A pure function containing all state transition logic currently in the
               setState callbacks of useWaveEvents.ts. Each case in the switch handles
               one action type, matching the existing setState logic exactly.

            Reference the current useWaveEvents.ts at
            `/Users/dayna.blackwell/code/scout-and-wave-web/web/src/hooks/useWaveEvents.ts`

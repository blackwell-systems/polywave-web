            not be exercisable until that migration completes.
          likelihood: high
          impact: low
          mitigation: |
            The prepare-wave migration has already landed. Agent A's task is purely
            additive: emit a prepare_failed event in the existing PrepareWave error
            handling block. The existing orchestrator.RunWave path is not affected.
        - scenario: |
            Agent C creates WavePrepFailurePanel importing PrepareStepInfo from
            types.ts, but Agent B hasn't merged yet (same wave). TypeScript compile
            will fail in Agent C's worktree.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent C defines a local copy of PrepareStepInfo in the component file
            with a TODO comment to switch to the import from types.ts. The wave 2
            agent (D) ensures the import is from the canonical location. Alternatively,
            agents in the same wave can compile independently since worktrees are
            isolated.
        - scenario: |
            The step names in engine/prepare.go change between now and when
            IMPL-web-prepare-wave-migration lands.
          likelihood: low
          impact: medium
          mitigation: |
            Step names are string constants derived from the engine code. The
            STEP_LABELS map in WavePrepFailurePanel gracefully falls back to
            displaying the raw step name for unknown steps. Recovery buttons
            use a default "Retry" for unmapped steps.

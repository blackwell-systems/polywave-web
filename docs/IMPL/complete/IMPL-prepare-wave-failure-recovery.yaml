interface_contracts:
    - name: prepare_step SSE event
      description: |
        New SSE event type emitted by the Go backend during PrepareWave execution.
        Each step in engine.PrepareWave fires an OnEvent callback; the wave_service
        must translate these into SSE events on the wave channel.
      definition: |
        // SSE event name: "prepare_step"
        // Payload shape (JSON):
        {
          "slug": string,
          "wave": number,
          "step": string,      // e.g. "baseline_gates", "i1_disjoint", "scaffold_validation"
          "status": string,    // "success" | "failed" | "warning" | "skipped"
          "detail": string     // human-readable detail from engine
        }
      location: pkg/service/wave_service.go
    - name: PrepareStepInfo TypeScript type
      description: |
        Frontend type representing a single prepare step's state, consumed by
        WavePrepFailurePanel and the reducer.
      definition: |
        export interface PrepareStepInfo {
          step: string
          status: 'pending' | 'running' | 'success' | 'failed' | 'warning' | 'skipped'
          detail?: string
        }
      location: web/src/types.ts
    - name: WavePrepFailurePanel component
      description: |
        React component that displays PrepareWave step progress and maps failed
        steps to recovery action buttons. Follows WaveRecoveryPanel pattern.
      definition: |
        interface WavePrepFailurePanelProps {
          slug: string
          wave: number
          steps: PrepareStepInfo[]
          onFixBuild: () => void
          onEditPlan: (section?: string) => void
          onRunScaffold: () => void
          onRerunCritic: () => void
          onCleanup: () => void
          onRetryPrepare: () => void
        }
        export function WavePrepFailurePanel(props: WavePrepFailurePanelProps): JSX.Element
      location: web/src/components/wave/WavePrepFailurePanel.tsx
    - name: PREPARE_STEP reducer action
      description: |
        New action type for the waveEventsReducer to track prepare step progress.
      definition: |
        // Added to WaveAction union:
        | { type: 'PREPARE_STEP'; step: string; status: string; detail?: string; wave: number }

        // New field on AppWaveState:
        prepareSteps: PrepareStepInfo[]  // ordered list of prepare steps
        prepareStatus: 'idle' | 'running' | 'failed' | 'complete'
      location: web/src/hooks/waveEventsReducer.ts
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Backend: Add prepare_failed SSE event to wave_service.go

            **Context:** The `runWaveLoop` function in `pkg/service/wave_service.go`
            already calls `engine.PrepareWave()` with an `OnEvent` callback that
            publishes `prepare_step` SSE events (this was added by IMPL-web-prepare-wave-migration).
            The `prepare_step` events are already flowing to the frontend.

            **What to implement (net-new work only):**

            1. **Add `prepare_failed` SSE event on PrepareWave failure.** Currently when
               PrepareWave fails, the code publishes only `run_failed`. Add a
               `prepare_failed` event BEFORE `run_failed` that includes the partial
               step results so the frontend can show which step failed and offer
               the correct recovery action:

               ```go
               if prepErr != nil {
                   // NEW: publish prepare_failed with step details for recovery UI
                   failedSteps := []map[string]string{}
                   if prepResult != nil {
                       for _, s := range prepResult.Steps {
                           failedSteps = append(failedSteps, map[string]string{
                               "step": s.Step, "status": s.Status, "detail": s.Detail,
                           })
                       }
                   }
                   publish("prepare_failed", map[string]interface{}{
                       "slug":  slug,
                       "wave":  waveNum,
                       "error": prepErr.Error(),
                       "steps": failedSteps,
                   })
                   publish("run_failed", map[string]string{"error": "prepare failed: " + prepErr.Error()})
                   return
               }
               ```

            2. **Do the same in `pkg/api/wave_runner.go` runWaveLoop** — find the
               PrepareWave error handling path and add the same `prepare_failed`
               event before `run_failed`. NOTE: wave_runner.go is NOT in your file
               list. Check if this file is already handled — if the api-layer
               runWaveLoop also has PrepareWave, it needs the same fix. If it's
               not in your ownership, document it as a wiring gap.

               Actually, wave_runner.go IS NOT in your file list. Skip it — just
               handle wave_service.go. The api-layer gap will be caught by
               integration validation.

            3. **Verify the existing `startWave` endpoint handles retry after prepare
               failure.** When PrepareWave fails and `run_failed` is published, the
               `ActiveWaves` map should be cleaned up so the user can retry. Check
               that the existing error path cleans up `ActiveWaves[slug]`. If not,
               add cleanup.

            **Interfaces:**
            - SSE event `prepare_failed`: `{slug, wave, error, steps[]}` where steps
              is an array of `{step, status, detail}` objects from PrepareWaveResult
            - `prepare_step` events already exist (no changes needed)

            **Tests:**
            - Add test verifying `prepare_failed` event is published when PrepareWave
              fails, and that the event includes step details.

            **Verification gate:**
            ```
            go build ./... && go test ./pkg/service/...
            ```

            **Constraints:**
            - Do NOT modify any frontend files.
            - Do NOT change the existing PrepareWave + orchestrator.RunWave call path;
              only add the `prepare_failed` event emission in the error handling block.
            - The change must be backward-compatible: existing `run_failed` event still
              fires after `prepare_failed` so frontends that don't handle the new event
              still work.
          files:
            - pkg/service/wave_service.go
        - id: B
          task: |
            ## Frontend State: Add prepare_step event handling to reducer and SSE listeners

            **What to implement:**

            1. In `web/src/types.ts`, add the `PrepareStepInfo` interface:
               ```typescript
               export interface PrepareStepInfo {
                 step: string
                 status: 'pending' | 'running' | 'success' | 'failed' | 'warning' | 'skipped'
                 detail?: string
               }
               ```

            2. In `web/src/hooks/waveEventsReducer.ts`:
               - Add new fields to `AppWaveState`:
                 ```typescript
                 prepareSteps: PrepareStepInfo[]
                 prepareStatus: 'idle' | 'running' | 'failed' | 'complete'
                 ```
               - Add to `initialWaveState`:
                 ```typescript
                 prepareSteps: [],
                 prepareStatus: 'idle',
                 ```
               - Add new action types to `WaveAction` union:
                 ```typescript
                 | { type: 'PREPARE_STEP'; step: string; status: string; detail?: string; wave: number }
                 | { type: 'PREPARE_FAILED'; error: string; steps: Array<{step: string; status: string; detail?: string}>; wave: number }
                 | { type: 'PREPARE_COMPLETE'; wave: number }
                 ```
               - Handle in reducer:
                 - `PREPARE_STEP`: Upsert step into `prepareSteps` array by step name.
                   Set `prepareStatus: 'running'`. If status is 'failed', also set
                   `prepareStatus: 'failed'`.
                 - `PREPARE_FAILED`: Set `prepareStatus: 'failed'`, populate
                   `prepareSteps` from the steps array in the action.
                 - `PREPARE_COMPLETE`: Set `prepareStatus: 'complete'`.
               - On `RESET` action, reset prepareSteps to [] and prepareStatus to 'idle'.

            3. In `web/src/lib/waveEventListeners.ts`:
               - Add listener for `prepare_step` SSE event:
                 ```typescript
                 es.addEventListener('prepare_step', (event: MessageEvent) => {
                   const data = JSON.parse(event.data) as {
                     slug: string; wave: number; step: string; status: string; detail?: string
                   }
                   dispatch({ type: 'PREPARE_STEP', step: data.step, status: data.status, detail: data.detail, wave: data.wave })
                 })
                 ```
               - Add listener for `prepare_failed` SSE event:
                 ```typescript
                 es.addEventListener('prepare_failed', (event: MessageEvent) => {
                   const data = JSON.parse(event.data) as {
                     slug: string; wave: number; error: string;
                     steps: Array<{step: string; status: string; detail?: string}>
                   }
                   dispatch({ type: 'PREPARE_FAILED', error: data.error, steps: data.steps, wave: data.wave })
                 })
                 ```

            **Tests:**
            - Add test cases to `web/src/hooks/__tests__/waveEventsReducer.test.ts`:
              - PREPARE_STEP action upserts step correctly
              - PREPARE_STEP with status 'failed' sets prepareStatus to 'failed'
              - PREPARE_FAILED populates steps array
              - PREPARE_COMPLETE sets prepareStatus to 'complete'
              - RESET clears prepare state

            **Verification gate:**
            ```
            cd web && npx tsc --noEmit && node_modules/.bin/vitest run --reporter=verbose
            ```

            **Constraints:**
            - Do NOT modify any Go files.
            - Do NOT create new component files.
            - Follow exact field names from the interface contract (PrepareStepInfo).
            - Maintain backward compat: existing WaveAction consumers must not break.
          files:
            - web/src/types.ts
            - web/src/hooks/waveEventsReducer.ts
            - web/src/lib/waveEventListeners.ts
        - id: C
          task: |
            ## New Component: WavePrepFailurePanel

            **What to implement:**

            Create `web/src/components/wave/WavePrepFailurePanel.tsx` — a React component
            that displays PrepareWave step progress and maps each failed step to a
            specific recovery action button. Follow the pattern of the existing
            `WaveRecoveryPanel.tsx` and `RecoveryControlsPanel.tsx`.

            **Step name to recovery action mapping:**

            | Step Name | Recovery Button | Handler |
            |-----------|----------------|---------|
            | `baseline_gates` | "Fix Build" | `onFixBuild()` |
            | `cross_repo_baseline` | "Fix Build" | `onFixBuild()` |
            | `i1_disjoint` | "Edit Plan" | `onEditPlan('file-ownership')` |
            | `type_collision` | "Edit Plan" | `onEditPlan('file-ownership')` |
            | `scaffold_validation` | "Run Scaffold" | `onRunScaffold()` |
            | `critic_verdict` | "Re-run Critic" | `onRerunCritic()` |
            | `stale_cleanup` | "Clean Up" | `onCleanup()` |
            | `resume_detection` | "Clean Up" | `onCleanup()` |
            | `file_existence` | "Edit Plan" | `onEditPlan('file-ownership')` |
            | `dep_check` | "View Dependencies" (link to status) | `onEditPlan('dependency-graph')` |
            | `dep_outputs` | "View Dependencies" | `onEditPlan('dependency-graph')` |
            | `freeze_check` | "Edit Plan" | `onEditPlan('interface-contracts')` |
            | `wiring_ownership` | "Edit Plan" | `onEditPlan('wiring')` |
            | `pre_wave_gate` | "Edit Plan" | `onEditPlan()` |

            For any step not in the table, show a generic "Retry" button calling
            `onRetryPrepare()`.

            **Component structure:**

            1. Step progress list: Show all steps in order received, with status icons
               (checkmark for success, X for failed, spinner for running, dash for pending,
               arrow for skipped, warning triangle for warning). Use the same
               `StatusIcon` pattern from `RecoveryControlsPanel.tsx`.

            2. Failed step detail: When a step fails, show its `detail` string and the
               mapped recovery button.

            3. Summary bar at bottom: "Retry Preparation" button (calls `onRetryPrepare`)
               and total step count (X/Y passed).

            **Step labels (human-readable):**
            ```typescript
            const STEP_LABELS: Record<string, string> = {
              resume_detection: 'Resume Detection',
              dep_check: 'Dependency Check',
              load_manifest: 'Load Manifest',
              critic_verdict: 'Critic Review (E37)',
              stale_cleanup: 'Stale Worktree Cleanup',
              repo_match: 'Repository Match',
              dep_outputs: 'Dependency Outputs (H2)',
              ownership_coverage: 'Ownership Coverage (H1)',
              file_existence: 'File Existence',
              merge_target_checkout: 'Merge Target Checkout',
              baseline_gates: 'Baseline Gates (E21A)',
              cross_repo_baseline: 'Cross-Repo Baseline (E21B)',
              wiring_ownership: 'Wiring Ownership (E35)',
              scaffold_validation: 'Scaffold Validation (I2)',
              freeze_check: 'Freeze Check (I2)',
              i1_disjoint: 'Disjoint Ownership (I1)',
              type_collision: 'Type Collision (E41)',
              pre_wave_gate: 'Pre-Wave Gate (C7)',
              create_worktrees: 'Create Worktrees',
              verify_hooks: 'Verify Hooks (H10)',
              extract_briefs: 'Extract Agent Briefs',
            }
            ```

            **Props interface:**
            ```typescript
            interface WavePrepFailurePanelProps {
              slug: string
              wave: number
              steps: PrepareStepInfo[]  // import from '../../types'
              onFixBuild: () => void
              onEditPlan: (section?: string) => void
              onRunScaffold: () => void
              onRerunCritic: () => void
              onCleanup: () => void
              onRetryPrepare: () => void
            }
            ```

            **Styling:** Use the same Tailwind classes as WaveRecoveryPanel — red-50/red-200
            border for failed state, amber for warnings. Dark mode support required.

            **Tests:**
            Create `WavePrepFailurePanel.test.tsx` with:
            - Renders all steps with correct status icons
            - Shows recovery button matching the failed step name
            - Calls correct handler when recovery button clicked
            - Shows detail text for failed steps

            **Verification gate:**
            ```
            cd web && npx tsc --noEmit && node_modules/.bin/vitest run src/components/wave/WavePrepFailurePanel.test.tsx
            ```


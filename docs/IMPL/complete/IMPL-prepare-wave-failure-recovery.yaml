            - Import `PrepareStepInfo` from `../../types` (will be added by Agent B).
              For development, define a local copy of the type if needed, but the final
              import must reference `../../types`.
            - Follow the existing component patterns in `web/src/components/wave/`.
          files:
            - web/src/components/wave/WavePrepFailurePanel.tsx
            - web/src/components/wave/WavePrepFailurePanel.test.tsx

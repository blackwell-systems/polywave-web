    - number: 2
      agents:
        - id: D
          task: |
            ## Integration: Wire WavePrepFailurePanel into WaveBoard

            **What to implement:**

            Modify `web/src/components/WaveBoard.tsx` to display the
            `WavePrepFailurePanel` when PrepareWave fails, and show real-time
            prepare step progress during wave preparation.

            **Changes:**

            1. Import the new component and types:
               ```typescript
               import { WavePrepFailurePanel } from './wave/WavePrepFailurePanel'
               import type { PrepareStepInfo } from '../types'
               ```

            2. Read prepare state from `useWaveEvents`:
               The `state` object from `useWaveEvents(slug)` now includes:
               - `state.prepareSteps: PrepareStepInfo[]`
               - `state.prepareStatus: 'idle' | 'running' | 'failed' | 'complete'`

            3. Add prepare progress display: Between the "Start Execution" button and
               the wave rows, show a prepare step timeline when `prepareStatus` is
               'running' or 'failed'. Use a collapsible section:

               ```tsx
               {(state.prepareStatus === 'running' || state.prepareStatus === 'failed') && (
                 <div className="bg-card border border-border rounded-none shadow-sm p-4">
                   <h3 className="text-sm font-semibold text-foreground mb-3">
                     {state.prepareStatus === 'running' ? 'Preparing Wave...' : 'Preparation Failed'}
                   </h3>
                   {state.prepareStatus === 'failed' ? (
                     <WavePrepFailurePanel
                       slug={slug}
                       wave={/* current wave number */}
                       steps={state.prepareSteps}
                       onFixBuild={() => void handleFixBuild()}
                       onEditPlan={(section) => {/* navigate to ReviewScreen with section */}}
                       onRunScaffold={() => void rerunScaffold(slug)}
                       onRerunCritic={() => {/* call critic */}}
                       onCleanup={() => void batchDeleteWorktrees(slug, { branches: state.staleBranches?.branches ?? [], force: true })}
                       onRetryPrepare={() => void startWave(slug)}
                     />
                   ) : (
                     /* Simple step list showing progress */
                     <ul className="space-y-1 text-xs">
                       {state.prepareSteps.map(s => (
                         <li key={s.step} className="flex items-center gap-2">
                           <span className={`w-2 h-2 rounded-full ${s.status === 'success' ? 'bg-green-500' : s.status === 'failed' ? 'bg-red-500' : 'bg-yellow-500'}`} />
                           <span>{STEP_LABELS[s.step] ?? s.step}</span>
                         </li>
                       ))}
                     </ul>
                   )}
                 </div>
               )}
               ```

            4. Wire the `onEditPlan` callback: Use the existing navigation pattern.
               The WaveBoard receives `onRescout` as a prop; similarly, add an
               `onEditPlan` prop (optional) or navigate via URL. Since the App.tsx
               uses a single-page layout with slug-based state, the simplest approach
               is to dispatch a custom event or use a callback prop:
               ```typescript
               // Add to WaveBoardProps:
               onEditPlan?: (section?: string) => void
               ```

            5. Import `rerunScaffold` from the api module for the scaffold recovery
               button.

            6. For the "Re-run Critic" button, use the `runCritic` function from
               `useCriticState` (already used in WaveBoard for the pre-execution
               critic gate).

            **Prepare status display rules:**
            - `idle`: Show nothing (default state before wave starts)
            - `running`: Show step progress list with spinner
            - `failed`: Show WavePrepFailurePanel with recovery actions
            - `complete`: Show nothing (preparation succeeded, agents will start)

            **Tests:**
            No new test file needed. The WaveBoard does not currently have unit tests
            (it's an integration-level component tested via E2E). The WavePrepFailurePanel
            has its own tests from Agent C.

            **Verification gate:**
            ```
            cd web && npx tsc --noEmit && node_modules/.bin/vitest run
            ```

            **Constraints:**
            - Do NOT modify waveEventsReducer.ts, waveEventListeners.ts, or types.ts
              (those are owned by Agent B in wave 1).
            - Do NOT modify WavePrepFailurePanel.tsx (owned by Agent C in wave 1).
            - Do NOT modify any Go files.
            - The panel must degrade gracefully: if `prepareSteps` is empty and
              `prepareStatus` is 'idle', render nothing.
          files:
            - web/src/components/WaveBoard.tsx
          dependencies:
            - B
            - C

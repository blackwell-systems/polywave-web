verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: 7+ distinct files changing across Go backend and React
       frontend. No two agents need conflicting modifications to the same file.
       Clear separation: backend SSE emission (Go), state management (reducer),
       SSE listener wiring (TS), new component (TSX), WaveBoard integration (TSX),
       API client additions (TS), tests.

    2. Investigation-first: Not required. The PrepareWave step names and failure
       classes are fully defined in engine/prepare.go. The recovery actions map
       to existing endpoints (fix-build, scaffold rerun, cleanup-stale, critic).

    3. Interface discoverability: Yes. The prepare_step SSE event shape is defined
       by engine.StepResult (step, status, detail). Recovery action mapping is a
       pure frontend concern with known step names from prepare.go.

    4. Pre-implementation status: prepare_step SSE event does not exist in the web
       app yet. WaveRecoveryPanel exists for post-merge failures but has no
       pre-wave failure handling. The PIPELINE_STEP reducer action exists but
       handles finalize steps, not prepare steps.

    5. Parallelization value: High. 4 agents across 2 waves, Go + TS build/test
       cycles (>30s each). Agents are largely independent in wave 1 (backend SSE,
       frontend state, new component). Wave 2 integrates into WaveBoard.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (4 agents, 2 waves, ~6 min avg with parallelism)
    - Merge & verification: ~4 min
    Total SAW time: ~24 min

    Sequential baseline: ~40 min (4 agents x 10 min avg)
    Time savings: ~16 min (40% faster)

    Recommendation: Clear speedup. Proceed.
